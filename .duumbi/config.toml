[workspace]
name = "myapp"
namespace = "myapp"
default-registry = "duumbi"

[[providers]]
provider = "minimax"
role = "primary"
model = "MiniMax-M2.7"
api_key_env = "MINIMAX_API_KEY"

[registries]
duumbi = "https://registry.duumbi.dev"

[dependencies]
"@duumbi/stdlib-io" = "1.0.0"
"@duumbi/stdlib-math" = "1.0.0"
"@duumbi/stdlib-lang" = "1.0.0"
"@duumbi/stdlib-string" = "1.0.0"
