intent: How many steps does the Collatz sequence take to reach 1?
version: 1
status: pending
acceptance_criteria:
- collatz_steps(n) returns the number of steps to reach 1 starting from n
- collatz_steps(1) returns 0 (already at 1)
- collatz_steps(n) applies n/2 if even, 3n+1 if odd, repeatedly until reaching 1
- collatz_steps handles positive integers correctly
modules:
  create:
  - math/collatz
  modify:
  - app/main
test_cases:
