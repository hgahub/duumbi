intent: Convert Celsius to Fahrenheit
version: 1
status: pending
acceptance_criteria:
- celsius_to_fahrenheit(c) returns the Fahrenheit equivalent of Celsius temperature c
- celsius_to_fahrenheit(0) returns 32 (freezing point of water)
- celsius_to_fahrenheit(100) returns 212 (boiling point of water)
- celsius_to_fahrenheit handles negative temperatures correctly
modules:
  create:
  - convert/temp
  modify:
  - app/main
test_cases:
- name: zero_celsius
  function: celsius_to_fahrenheit
  args:
  - 0
  expected_return: 32
- name: boiling_point
  function: celsius_to_fahrenheit
  args:
  - 100
  expected_return: 212
- name: negative_forty
  function: celsius_to_fahrenheit
  args:
  - -40
  expected_return: -40
- name: negative_ten
  function: celsius_to_fahrenheit
  args:
  - -10
  expected_return: 14
- name: one_degree
  function: celsius_to_fahrenheit
  args:
  - 1
  expected_return: 33
dependencies: []
