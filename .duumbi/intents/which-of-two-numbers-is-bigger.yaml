intent: Which of two numbers is bigger?
version: 1
status: pending
acceptance_criteria:
- max(a, b) returns the larger of two integers
- max(a, b) returns a when a equals b
- max handles negative numbers correctly
modules:
  create:
  - compare/ops
  modify:
  - app/main
test_cases:
- name: first_larger
  function: max
  args:
  - 5
  - 3
  expected_return: 5
- name: second_larger
  function: max
  args:
  - 2
  - 9
  expected_return: 9
- name: equal_numbers
  function: max
  args:
  - 7
  - 7
  expected_return: 7
- name: negative_numbers
  function: max
  args:
  - -4
  - -1
  expected_return: -1
- name: zero_and_positive
  function: max
  args:
  - 0
  - 5
  expected_return: 5
- name: both_negative
  function: max
  args:
  - -10
  - -3
  expected_return: -3
- name: both_zero
  function: max
  args:
  - 0
  - 0
  expected_return: 0
