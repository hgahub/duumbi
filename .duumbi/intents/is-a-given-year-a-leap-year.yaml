intent: Is a given year a leap year?
version: 1
status: pending
acceptance_criteria:
- is_leap_year(year) returns 1 if year is a leap year, 0 otherwise
- A year is a leap year if divisible by 4
- A year divisible by 100 is NOT a leap year (century rule)
- A year divisible by 400 IS a leap year (century exception)
modules:
  create:
  - time/date
  modify:
  - app/main
test_cases:
- name: leap_year_standard
  function: is_leap_year
  args:
  - 2024
  expected_return: 1
- name: leap_year_2020
  function: is_leap_year
  args:
  - 2020
  expected_return: 1
- name: non_leap_year
  function: is_leap_year
  args:
  - 2023
  expected_return: 0
- name: century_not_leap
  function: is_leap_year
  args:
  - 1900
  expected_return: 0
- name: century_leap_400
  function: is_leap_year
  args:
  - 2000
  expected_return: 1
- name: century_leap_1600
  function: is_leap_year
  args:
  - 1600
  expected_return: 1
- name: century_not_leap_2100
  function: is_leap_year
  args:
  - 2100
  expected_return: 0
- name: negative_leap_year
  function: is_leap_year
  args:
  - -4
  expected_return: 1
dependencies: []
created_at: 2026-01-01T21:08:52Z
