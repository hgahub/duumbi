intent: Check if a number is prime
version: 1
status: pending
acceptance_criteria:
- is_prime(n) returns 1 when n is a prime number
- is_prime(n) returns 0 when n is not a prime number
- is_prime(2) returns 1 (smallest prime)
- is_prime(0) returns 0 (zero is not prime)
- is_prime(1) returns 0 (one is not prime)
- is_prime handles negative numbers by returning 0
modules:
  create:
  - math/prime
  modify:
  - app/main
test_cases:
- name: smallest_prime
  function: is_prime
  args:
  - 2
  expected_return: 1
- name: odd_prime
  function: is_prime
  args:
  - 17
  expected_return: 1
- name: another_prime
  function: is_prime
  args:
  - 11
  expected_return: 1
- name: composite_even
  function: is_prime
  args:
  - 4
  expected_return: 0
- name: composite_odd
  function: is_prime
  args:
  - 9
  expected_return: 0
- name: composite_square
  function: is_prime
  args:
  - 25
  expected_return: 0
- name: zero_not_prime
  function: is_prime
  args:
  - 0
  expected_return: 0
- name: one_not_prime
  function: is_prime
  args:
  - 1
  expected_return: 0
- name: negative_not_prime
  function: is_prime
  args:
  - -7
  expected_return: 0
