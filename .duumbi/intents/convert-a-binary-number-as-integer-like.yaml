intent: Convert a binary number (as integer like 1010) to decimal
version: 1
status: pending
acceptance_criteria:
- binary_to_decimal(n) converts a binary number (encoded as integer digits) to its decimal equivalent
- binary_to_decimal(1010) returns 10
- binary_to_decimal(0) returns 0
- binary_to_decimal handles negative inputs by using absolute value
