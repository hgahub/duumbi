intent: "Build a clamping module with clamp(x, lo, hi) that clamps an i64 value between lo and hi"
version: 1
status: pending
acceptance_criteria:
  - "clamp(x, lo, hi) returns lo if x < lo"
  - "clamp(x, lo, hi) returns hi if x > hi"
  - "clamp(x, lo, hi) returns x if lo <= x <= hi"
modules:
  create:
    - "math/clamp"
  modify:
    - "app/main"
test_cases:
  - name: "below_lo"
    function: "clamp"
    args: [2, 5, 10]
    expected_return: 5
  - name: "in_range"
    function: "clamp"
    args: [7, 5, 10]
    expected_return: 7
  - name: "above_hi"
    function: "clamp"
    args: [15, 5, 10]
    expected_return: 10
  - name: "at_lo"
    function: "clamp"
    args: [5, 5, 10]
    expected_return: 5
dependencies: []
