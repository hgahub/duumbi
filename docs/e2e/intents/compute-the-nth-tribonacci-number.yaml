intent: Compute the nth tribonacci number
version: 1
status: pending
acceptance_criteria:
- tribonacci(n) returns the nth number in the tribonacci sequence
- tribonacci(0) returns 0 (first base case)
- tribonacci(1) returns 0 (second base case)
- tribonacci(2) returns 1 (third base case)
- tribonacci(n) for n>2 returns sum of previous three tribonacci numbers
