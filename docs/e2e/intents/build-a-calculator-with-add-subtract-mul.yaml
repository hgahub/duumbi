intent: Build a calculator with add, subtract, multiply, divide
version: 1
status: pending
acceptance_criteria:
- add(a, b) returns the sum of two integers
- subtract(a, b) returns the difference of a minus b
- multiply(a, b) returns the product of two integers
- divide(a, b) returns the integer quotient of a divided by b (truncates toward zero)
- All operations handle positive numbers, negative numbers, and zero
- Division by zero returns 0
modules:
  create:
  - calculator/ops
  modify:
  - app/main
test_cases:
- name: add_basic
  function: add
  args:
  - 3
  - 5
  expected_return: 8
- name: add_negative
  function: add
  args:
  - -4
  - 2
  expected_return: -2
- name: add_both_negative
  function: add
  args:
  - -3
  - -5
  expected_return: -8
- name: add_zero
  function: add
  args:
  - 0
  - 7
  expected_return: 7
