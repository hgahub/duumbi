intent: Calculate 2 to the power of n
version: 1
status: pending
acceptance_criteria:
- pow2(n) returns 2 raised to the power of n
- pow2(0) returns 1 (2^0 = 1)
- pow2(n) handles positive exponents correctly
- pow2(n) returns 0 for negative exponents (fractional result truncates to 0)
modules:
  create:
  - math/ops
  modify:
  - app/main
test_cases:
- name: pow2_zero
  function: pow2
  args:
  - 0
  expected_return: 1
- name: pow2_one
  function: pow2
  args:
  - 1
  expected_return: 2
- name: pow2_basic
  function: pow2
  args:
  - 5
  expected_return: 32
- name: pow2_negative
  function: pow2
  args:
  - -1
  expected_return: 0
- name: pow2_negative_three
  function: pow2
  args:
  - -3
  expected_return: 0
dependencies: []
