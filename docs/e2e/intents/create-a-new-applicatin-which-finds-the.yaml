intent: Create a new applicatin which finds the least common multiple of two numbers
version: 1
status: in_progress
acceptance_criteria:
- lcm(a, b) returns the least common multiple of two integers
- lcm(a, 0) returns 0
- lcm handles negative inputs by using absolute values
- lcm(a, b) equals lcm(b, a)
modules:
  create:
  - math/lcm
  modify:
  - app/main
test_cases:
- name: lcm_basic
  function: lcm
  args:
  - 4
  - 6
  expected_return: 12
- name: lcm_coprime
  function: lcm
  args:
  - 7
  - 5
  expected_return: 35
- name: lcm_equal
  function: lcm
  args:
  - 5
  - 5
  expected_return: 5
- name: lcm_zero_first
  function: lcm
  args:
  - 0
  - 7
  expected_return: 0
- name: lcm_zero_second
  function: lcm
  args:
  - 3
  - 0
  expected_return: 0
- name: lcm_negative
  function: lcm
  args:
  - -4
  - 6
  expected_return: 12
- name: lcm_both_negative
  function: lcm
  args:
  - -3
  - -5
  expected_return: 15
dependencies: []
created_at: 2026-01-01T12:22:02Z
