intent: 'Digital root: keep summing digits until single digit'
version: 1
status: pending
acceptance_criteria:
- digital_root(n) returns a single digit by repeatedly summing digits
- digital_root(16) returns 7 (1+6)
- digital_root(942) returns 6 (9+4+2=15, 1+5=6)
- digital_root(0) returns 0
- digital_root handles negative numbers by using absolute value
