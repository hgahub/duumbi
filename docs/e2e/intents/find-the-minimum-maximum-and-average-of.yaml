intent: Find the minimum, maximum, and average of three numbers
version: 1
status: pending
acceptance_criteria:
- min_of_three(a, b, c) returns the smallest of three integers
- max_of_three(a, b, c) returns the largest of three integers
- average_of_three(a, b, c) returns the integer average (truncated toward zero) of three integers
