intent: Check if a number is an Armstrong number
version: 1
status: pending
acceptance_criteria:
- is_armstrong(n) returns 1 if n is an Armstrong number, 0 otherwise
- Single digit numbers 0-9 are Armstrong numbers
- 153, 370, 371, 407 are Armstrong numbers
- 1634, 54748, 548834 are Armstrong numbers
- Non-Armstrong numbers return 0
- Negative numbers are not Armstrong numbers
