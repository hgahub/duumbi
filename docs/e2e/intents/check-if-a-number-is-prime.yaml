intent: Check if a number is prime
version: 1
status: pending
acceptance_criteria:
- is_prime(n) returns 1 when n is a prime number
- is_prime(n) returns 0 when n is not a prime number
- is_prime(0) returns 0 (zero is not prime)
- is_prime(1) returns 0 (one is not prime)
- is_prime(2) returns 1 (two is the only even prime)
- is_prime handles negative numbers by returning 0
modules:
  create:
  - math/prime
  modify:
  - app/main
test_cases:
- name: prime_small
  function: is_prime
  args:
  - 2
  expected_return: 1
- name: prime_three
  function: is_prime
  args:
  - 3
  expected_return: 1
- name: prime_seventeen
  function: is_prime
  args:
  - 17
  expected_return: 1
- name: composite_four
  function: is_prime
  args:
  - 4
  expected_return: 0
- name: composite_fifteen
  function: is_prime
  args:
  - 15
  expected_return: 0
- name: zero_not_prime
  function: is_prime
  args:
  - 0
  expected_return: 0
- name: one_not_prime
  function: is_prime
  args:
  - 1
  expected_return: 0
- name: negative_not_prime
  function: is_prime
  args:
  - -7
  expected_return: 0
