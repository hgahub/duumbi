intent: Find the least common multiple of two numbers
version: 1
status: pending
acceptance_criteria:
- lcm(a, b) returns the least common multiple of two positive integers
- lcm(a, b) handles negative inputs by using absolute values
- lcm(a, 1) returns |a|
- lcm(a, 0) returns 0
modules:
  create:
  - math/lcm
  modify:
  - app/main
test_cases:
- name: lcm_basic
  function: lcm
  args:
  - 4
  - 6
  expected_return: 12
- name: lcm_coprime
  function: lcm
  args:
  - 7
  - 5
  expected_return: 35
- name: lcm_multiple
  function: lcm
  args:
  - 3
  - 12
  expected_return: 12
- name: lcm_equal
  function: lcm
  args:
  - 5
  - 5
  expected_return: 5
- name: lcm_zero_one
  function: lcm
  args:
  - 7
  - 0
  expected_return: 0
- name: lcm_zero_both
  function: lcm
  args:
  - 0
  - 0
  expected_return: 0
- name: lcm_negative
  function: lcm
  args:
  - -4
  - 6
  expected_return: 12
- name: lcm_both_negative
  function: lcm
  args:
  - -3
  - -5
  expected_return: 15
