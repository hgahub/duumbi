intent: 'Build a modular arithmetic toolkit: add, multiply, power (mod m)'
version: 1
status: pending
acceptance_criteria:
- add_mod(a, b, m) returns (a + b) mod m
- add_mod handles negative inputs correctly
- multiply_mod(a, b, m) returns (a * b) mod m
- multiply_mod handles negative inputs correctly
- power_mod(base, exp, m) returns base^exp mod m using efficient modular exponentiation
- power_mod(exp=0) returns 1 mod m
- All functions handle m=1 correctly (result always 0)
modules:
  create:
  - math/modular
  modify:
  - app/main
