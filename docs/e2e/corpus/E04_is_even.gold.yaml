intent: "Check if a number is even"
version: 1
status: pending
acceptance_criteria:
  - "is_even(n) returns 1 when n is even"
  - "is_even(n) returns 0 when n is odd"
  - "is_even(0) returns 1 (zero is even)"
  - "is_even handles negative numbers correctly"
modules:
  create:
    - "math/ops"
  modify:
    - "app/main"
test_cases:
  - name: "is_even_even_positive"
    function: "is_even"
    args: [4]
    expected_return: 1
  - name: "is_even_odd_positive"
    function: "is_even"
    args: [7]
    expected_return: 0
  - name: "is_even_zero"
    function: "is_even"
    args: [0]
    expected_return: 1
  - name: "is_even_negative_even"
    function: "is_even"
    args: [-6]
    expected_return: 1
  - name: "is_even_negative_odd"
    function: "is_even"
    args: [-3]
    expected_return: 0
dependencies: []
