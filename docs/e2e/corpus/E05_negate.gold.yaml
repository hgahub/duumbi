intent: "Negate a given number"
version: 1
status: pending
acceptance_criteria:
  - "negate(n) returns -n for any i64 input"
  - "negate(0) returns 0"
  - "negate of a negative number returns a positive number"
modules:
  create:
    - "math/ops"
  modify:
    - "app/main"
test_cases:
  - name: "negate_positive"
    function: "negate"
    args: [5]
    expected_return: -5
  - name: "negate_negative"
    function: "negate"
    args: [-8]
    expected_return: 8
  - name: "negate_zero"
    function: "negate"
    args: [0]
    expected_return: 0
  - name: "negate_one"
    function: "negate"
    args: [1]
    expected_return: -1
dependencies: []
