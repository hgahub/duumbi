intent: "Find the least common multiple of two numbers"
version: 1
status: pending
acceptance_criteria:
  - "lcm(a, b) returns the smallest positive integer divisible by both a and b"
  - "lcm(4, 6) returns 12"
  - "lcm(3, 5) returns 15 (coprime inputs)"
  - "lcm(7, 7) returns 7 (equal inputs)"
  - "lcm(0, 5) returns 0 (zero input)"
  - "lcm(12, 8) returns 24"
modules:
  create:
    - "math/lcm"
  modify:
    - "app/main"
test_cases:
  - name: "lcm_basic"
    function: "lcm"
    args: [4, 6]
    expected_return: 12
  - name: "lcm_coprime"
    function: "lcm"
    args: [3, 5]
    expected_return: 15
  - name: "lcm_equal"
    function: "lcm"
    args: [7, 7]
    expected_return: 7
  - name: "lcm_zero"
    function: "lcm"
    args: [0, 5]
    expected_return: 0
  - name: "lcm_larger"
    function: "lcm"
    args: [12, 8]
    expected_return: 24
dependencies: []
