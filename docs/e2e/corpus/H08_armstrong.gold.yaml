intent: "Check if a number is an Armstrong number"
version: 1
status: pending
acceptance_criteria:
  - "is_armstrong(n) returns 1 if n equals the sum of its digits each raised to the power of the number of digits"
  - "is_armstrong(n) returns 0 if n is not an Armstrong number"
  - "is_armstrong(0) returns 1 (0 = 0^1)"
  - "is_armstrong(1) returns 1 (1 = 1^1)"
  - "is_armstrong(153) returns 1 (1^3 + 5^3 + 3^3 = 1 + 125 + 27 = 153)"
  - "is_armstrong(370) returns 1 (3^3 + 7^3 + 0^3 = 27 + 343 + 0 = 370)"
  - "is_armstrong(10) returns 0 (1^2 + 0^2 = 1 != 10)"
  - "is_armstrong(100) returns 0 (1^3 + 0^3 + 0^3 = 1 != 100)"
modules:
  create:
    - "math/armstrong"
  modify:
    - "app/main"
test_cases:
  - name: "armstrong_zero"
    function: "is_armstrong"
    args: [0]
    expected_return: 1
  - name: "armstrong_one"
    function: "is_armstrong"
    args: [1]
    expected_return: 1
  - name: "armstrong_153"
    function: "is_armstrong"
    args: [153]
    expected_return: 1
  - name: "armstrong_370"
    function: "is_armstrong"
    args: [370]
    expected_return: 1
  - name: "not_armstrong_10"
    function: "is_armstrong"
    args: [10]
    expected_return: 0
  - name: "not_armstrong_100"
    function: "is_armstrong"
    args: [100]
    expected_return: 0
dependencies: []
