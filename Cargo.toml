[package]
name = "duumbi"
version = "0.1.1"
edition = "2024"
license = "MPL-2.0"

[dependencies]
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
thiserror = "2"
petgraph = "0.7"
cranelift-codegen = "0.129"
cranelift-frontend = "0.129"
cranelift-module = "0.129"
cranelift-object = "0.129"
target-lexicon = "0.13"
toml = "0.8"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "fs", "process", "sync", "signal"] }
notify = "7"
reqwest = { version = "0.12", features = ["json", "stream"] }
axum = { version = "0.8", features = ["ws"] }
tower-http = { version = "0.6", features = ["cors"] }
notify-debouncer-mini = "0.5"
reedline = "0.37"
futures-util = "0.3"
serde_yaml = "0.9"
tempfile = "3"

[dev-dependencies]
tokio-tungstenite = "0.26"
