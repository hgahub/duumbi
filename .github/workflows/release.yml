name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-13
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      # Cross-compilation toolchain for Linux ARM64
      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      # Build duumbi CLI (release)
      - name: Build duumbi CLI
        run: cargo build --release --target ${{ matrix.target }}

      # Build studio binary (release, SSR feature)
      - name: Build duumbi-studio
        run: cargo build --release --target ${{ matrix.target }} -p duumbi-studio --features ssr

      # Package the release archive
      - name: Package
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          ARCHIVE="duumbi-${TAG}-${{ matrix.target }}"
          mkdir -p "${ARCHIVE}/runtime"

          cp "target/${{ matrix.target }}/release/duumbi" "${ARCHIVE}/"
          cp "target/${{ matrix.target }}/release/studio" "${ARCHIVE}/"
          cp runtime/duumbi_runtime.c "${ARCHIVE}/runtime/"
          cp LICENSE "${ARCHIVE}/" 2>/dev/null || true
          cp README.md "${ARCHIVE}/" 2>/dev/null || true

          tar czf "${ARCHIVE}.tar.gz" "${ARCHIVE}"
          echo "ARCHIVE=${ARCHIVE}.tar.gz" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*.tar.gz
          body: |
            ## DUUMBI ${{ github.ref_name }}

            ### Installation

            Download the archive for your platform, extract, and add to PATH:

            ```bash
            tar xzf duumbi-${{ github.ref_name }}-<target>.tar.gz
            sudo cp duumbi-${{ github.ref_name }}-<target>/duumbi /usr/local/bin/
            sudo cp duumbi-${{ github.ref_name }}-<target>/studio /usr/local/bin/
            ```

            ### What's included

            - `duumbi` — CLI compiler, AI mutation, intent system, MCP server
            - `studio` — Browser-based Studio (run with `duumbi studio`)
            - `runtime/duumbi_runtime.c` — C runtime for linking compiled binaries

            ### Platforms

            | Archive | Platform |
            |---------|----------|
            | `*-aarch64-apple-darwin.tar.gz` | macOS ARM (M1/M2/M3/M4) |
            | `*-x86_64-apple-darwin.tar.gz` | macOS Intel |
            | `*-x86_64-unknown-linux-gnu.tar.gz` | Linux x86_64 |
            | `*-aarch64-unknown-linux-gnu.tar.gz` | Linux ARM64 |
