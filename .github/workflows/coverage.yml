name: Coverage

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'crates/**'
      - 'runtime/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.cargo/**'
      - 'rust-toolchain'
      - 'rust-toolchain.toml'
      - 'rustfmt.toml'
      - 'clippy.toml'
      - '.github/workflows/coverage.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'crates/**'
      - 'runtime/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.cargo/**'
      - 'rust-toolchain'
      - 'rust-toolchain.toml'
      - 'rustfmt.toml'
      - 'clippy.toml'
      - '.github/workflows/coverage.yml'

env:
  CARGO_TERM_COLOR: always

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Install gcc (required for Cranelift linker tests)
        run: sudo apt-get update && sudo apt-get install -y gcc libcurl4-openssl-dev
      - name: Collect coverage
        run: >
          cargo llvm-cov
          --workspace --exclude duumbi-studio
          --all-targets
          --lcov --output-path lcov.info
      - name: Upload to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          # Codecov-side GPG key import intermittently returns "no valid OpenPGP
          # data found", which breaks uploader signature verification. Skip the
          # binary validation and don't gate the PR on Codecov outages.
          skip_validation: true
          fail_ci_if_error: false
      - name: Generate HTML report
        run: cargo llvm-cov report --html --output-dir coverage-html
      - name: Upload HTML artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-html
          path: coverage-html/
          retention-days: 14
