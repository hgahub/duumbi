name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Detect check scope
        id: scope
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "run_rust_checks=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch --no-tags --depth=1 origin "${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"
          changed_files="$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD)"

          rust_relevant_pattern='^(src/|tests/|crates/|runtime/|Cargo\.toml$|Cargo\.lock$|\.cargo/|rust-toolchain(\.toml)?$|rustfmt\.toml$|clippy\.toml$|\.github/workflows/(ci|coverage)\.yml$)'

          if [[ -z "$changed_files" ]]; then
            echo "run_rust_checks=true" >> "$GITHUB_OUTPUT"
          elif printf '%s\n' "$changed_files" | grep -E "$rust_relevant_pattern" >/dev/null; then
            echo "run_rust_checks=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_rust_checks=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Documentation-only check
        if: steps.scope.outputs.run_rust_checks == 'false'
        run: echo "No Rust-relevant files changed; Rust checks are not required for this PR."
      - uses: dtolnay/rust-toolchain@stable
        if: steps.scope.outputs.run_rust_checks == 'true'
        with:
          components: rustfmt, clippy
      - name: Install native runtime dependencies (Ubuntu)
        if: steps.scope.outputs.run_rust_checks == 'true' && matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev
      - name: Install native runtime dependencies (Windows)
        if: steps.scope.outputs.run_rust_checks == 'true' && matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc mingw-w64-x86_64-curl
          path-type: prepend
      - name: Select MSYS2 C compiler
        if: steps.scope.outputs.run_rust_checks == 'true' && matrix.os == 'windows-latest'
        shell: bash
        run: echo "CC=gcc" >> "$GITHUB_ENV"
      - uses: Swatinem/rust-cache@v2
        if: steps.scope.outputs.run_rust_checks == 'true'
      - name: Format check
        if: steps.scope.outputs.run_rust_checks == 'true'
        run: cargo fmt --check
      - name: Clippy
        if: steps.scope.outputs.run_rust_checks == 'true'
        run: cargo clippy --all-targets -- -D warnings
      - name: Install cargo-audit
        if: steps.scope.outputs.run_rust_checks == 'true' && matrix.os == 'ubuntu-latest'
        run: cargo install cargo-audit --locked
      - name: Dependency audit
        if: steps.scope.outputs.run_rust_checks == 'true' && matrix.os == 'ubuntu-latest'
        run: cargo audit
      - name: Build
        if: steps.scope.outputs.run_rust_checks == 'true'
        run: cargo build
      - name: Test
        if: steps.scope.outputs.run_rust_checks == 'true'
        run: cargo test --all

  check-complete:
    name: check
    runs-on: ubuntu-latest
    needs: check
    if: always()
    steps:
      - name: Verify matrix checks
        shell: bash
        run: |
          if [[ "${{ needs.check.result }}" != "success" ]]; then
            echo "Matrix check job finished with result: ${{ needs.check.result }}"
            exit 1
          fi

          echo "All matrix check jobs passed."
