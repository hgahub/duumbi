name: Docs Review (Copilot)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    # Trigger on code changes, not just docs, because we want to check if docs NEED update
    paths:
      - 'src/**'
      - 'crates/**'
      - 'Cargo.toml'
      - 'sites/docs/**'

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  docs-ai-update:
    name: Docs AI Update Request
    runs-on: ubuntu-latest
    steps:
      - name: Analyze docs impact and request Copilot docs update
        uses: actions/github-script@v8
        with:
          script: |
            const marker = "<!-- duumbi-docs-review -->";
            const prNumber = context.payload.pull_request.number;
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              per_page: 100,
            });

            const changed = files.map((f) => f.filename);
            const docsChanged = changed.some((f) => f.startsWith("sites/docs/src/"));
            const codeChanged = changed.some((f) =>
              f.startsWith("src/") ||
              f.startsWith("crates/") ||
              f === "Cargo.toml"
            );

            let body;
            if (!codeChanged) {
              body = `${marker}\n✅ No code-level changes detected that require docs validation in this workflow.`;
            } else if (docsChanged) {
              body = `${marker}\n✅ Docs look up-to-date for this change (code + docs were updated together).`;
            } else {
              body = `${marker}\n⚠️ Code changed without docs updates.\n\n@copilot Please update documentation under \`sites/docs/src/\` for this PR. Focus on CLI behavior, JSON-LD schema/types/ops, and architecture implications. Commit changes directly to this PR branch if updates are needed.`;
            }

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });

            const existing = comments.find(
              (c) => c.user?.type === "Bot" && c.body && c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
