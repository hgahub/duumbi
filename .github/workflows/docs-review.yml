name: Docs Review (Copilot)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    # Trigger when code changes — docs live in hgahub/duumbi-web, checked separately
    paths:
      - 'src/**'
      - 'crates/**'
      - 'Cargo.toml'

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  docs-ai-update:
    name: Docs AI Update Request
    runs-on: ubuntu-latest
    steps:
      - name: Analyze docs impact and request Copilot docs update
        uses: actions/github-script@v9
        with:
          script: |
            const marker = "<!-- duumbi-docs-review -->";
            const prNumber = context.payload.pull_request.number;

            // This workflow only fires when src/**, crates/**, or Cargo.toml change,
            // so code changes are guaranteed — docs live in hgahub/duumbi-web.
            const body = `${marker}\n⚠️ Code changed; docs may need updates.\n\n@copilot Please check if documentation needs updating in [hgahub/duumbi-web](https://github.com/hgahub/duumbi-web/tree/main/docs/src/content/docs) for this PR. Focus on CLI behavior, JSON-LD schema/types/ops, and architecture implications. If updates are needed, open a PR in that repo.`;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });

            const existing = comments.find(
              (c) => c.user?.type === "Bot" && c.body && c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
