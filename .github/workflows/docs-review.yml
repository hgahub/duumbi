name: Docs Review (Copilot)

on:
  pull_request:
    types: [opened, synchronize]
    # Trigger on code changes, not just docs, because we want to check if docs NEED update
    paths:
      - 'src/**'
      - 'crates/**'
      - 'Cargo.toml'
      - 'sites/docs/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  copilot-docs-review:
    name: Copilot Documentation Review
    runs-on: ubuntu-latest
    steps:
      - name: Request Copilot review
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                reviewers: ["copilot"],
              });
              core.info("Copilot reviewer requested.");
            } catch (error) {
              core.warning(`Could not request Copilot reviewer: ${error.message}`);
            }

      - name: Comment docs status
        uses: actions/github-script@v7
        with:
          script: |
            const marker = "<!-- duumbi-docs-review -->";
            const prNumber = context.payload.pull_request.number;
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              per_page: 100,
            });

            const changed = files.map((f) => f.filename);
            const docsChanged = changed.some((f) => f.startsWith("sites/docs/src/"));
            const codeChanged = changed.some((f) =>
              f.startsWith("src/") ||
              f.startsWith("crates/") ||
              f === "Cargo.toml"
            );

            let body;
            if (!codeChanged) {
              body = `${marker}\n✅ No code-level changes detected that require docs validation in this workflow.`;
            } else if (docsChanged) {
              body = `${marker}\n✅ Docs look up-to-date for this change (code + docs were updated together).`;
            } else {
              body = `${marker}\n⚠️ Code changed without docs updates. Please verify whether docs under \`sites/docs/src/\` need updates (CLI, JSON-LD schema/types/ops, or architecture).`;
            }

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });

            const existing = comments.find(
              (c) => c.user?.type === "Bot" && c.body && c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
