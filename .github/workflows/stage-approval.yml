name: Stage Approval

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      stage:
        description: 'DUUMBI stage (5 = Human Acceptance, 7 = Spec Review, 9 = Tech Spec Review)'
        required: true
        type: choice
        options: ['5', '7', '9']
      issue_number:
        description: 'GitHub issue number'
        required: true
        type: number
      decision:
        description: 'Approval decision'
        required: true
        type: choice
        options: ['approve', 'request-changes', 'needs-clarification', 'reject']
      rationale:
        description: 'Short rationale for the decision'
        required: false
        type: string
        default: ''
      pr_number:
        description: 'Associated PR number (stages 7/9, 0 to auto-detect)'
        required: false
        type: number
        default: 0
      reviewer:
        description: 'Reviewer source override'
        required: false
        type: string
        default: ''
  repository_dispatch:
    types: [stage-approval]

permissions:
  actions: read
  checks: read
  contents: write
  issues: write
  pull-requests: write
  statuses: read

concurrency:
  group: stage-approval-${{ github.event.inputs.pr_number || github.event.client_payload.pr_number || github.event.pull_request.number || github.event.inputs.issue_number || github.event.client_payload.issue_number || 'dispatch' }}
  cancel-in-progress: false

jobs:
  execute:
    name: Execute approval
    if: github.event_name != 'pull_request' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Execute decision
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        env:
          GH_PROJECT_PAT: ${{ secrets.GH_PROJECT_PAT }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_REVIEW_CHANNEL_ID: ${{ secrets.SLACK_REVIEW_CHANNEL_ID }}
          INPUT_SLACK_RESPONSE_URL: ${{ github.event.client_payload.slack_response_url || '' }}
          DUUMBI_REQUIRED_SPEC_REVIEWERS: ${{ vars.DUUMBI_REQUIRED_SPEC_REVIEWERS || '' }}
        with:
          script: |
            // ── Inputs ──────────────────────────────────────────────
            const raw = context.eventName === 'repository_dispatch'
              ? context.payload.client_payload
              : context.eventName === 'pull_request'
              ? {
                  stage: '',
                  issue_number: 0,
                  decision: 'approve',
                  rationale: '',
                  pr_number: Number(context.payload.pull_request?.number || context.payload.number || 0),
                  reviewer: `GitHub PR merge (${context.actor})`,
                }
              : {
                  stage: String(context.payload.inputs.stage),
                  issue_number: Number(context.payload.inputs.issue_number),
                  decision: String(context.payload.inputs.decision),
                  rationale: String(context.payload.inputs.rationale || ''),
                  pr_number: Number(context.payload.inputs.pr_number || 0),
                  reviewer: String(context.payload.inputs.reviewer || context.actor),
                };

            let stage = String(raw.stage);
            let issueNumber = Number(raw.issue_number);
            const decision = String(raw.decision);
            let rationale = raw.rationale || `Recorded via Stage Approval workflow (decision: ${decision}).`;
            let prNumber = Number(raw.pr_number || 0);
            let reviewer = raw.reviewer || context.actor;
            const { owner, repo } = context.repo;

            if (context.eventName === 'pull_request') {
              const pr = context.payload.pull_request;
              if (!pr?.merged) {
                core.info('Ignoring closed PR because it was not merged.');
                return;
              }
              prNumber = Number(pr.number || context.payload.number || prNumber);
              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner, repo, pull_number: prNumber, per_page: 100,
              });
              if (files.length !== 1 || files[0].status === 'removed') {
                core.info(`Ignoring merged PR #${prNumber}: not a single-file spec artifact.`);
                return;
              }
              const productMatch = files[0].filename.match(/^specs\/DUUMBI-(\d+)\/PRODUCT\.md$/);
              const technicalMatch = files[0].filename.match(/^specs\/DUUMBI-(\d+)\/TECHNICAL\.md$/);
              if (productMatch) {
                stage = '7';
                issueNumber = Number(productMatch[1]);
              } else if (technicalMatch) {
                stage = '9';
                issueNumber = Number(technicalMatch[1]);
              } else {
                core.info(`Ignoring merged PR #${prNumber}: ${files[0].filename} is not a DUUMBI spec artifact.`);
                return;
              }
              reviewer = `GitHub PR merge (${context.actor})`;
              rationale = `Spec-only PR #${prNumber} was merged by ${context.actor}; treating the merged review-clean artifact as Stage ${stage} approval evidence.`;
            }

            const issueUrl = `https://github.com/${owner}/${repo}/issues/${issueNumber}`;
            const today = new Date().toISOString().split('T')[0];
            let specPrMerge = null;

            core.info(`Stage ${stage} | ${decision} | issue #${issueNumber}`);

            // ── Stage decision matrix ───────────────────────────────
            const matrix = {
              '5': {
                title: 'Stage 5 Human Acceptance Decision',
                approve: {
                  label: 'Accept',
                  add: ['accepted', 'needs-spec'],
                  remove: ['needs-human-review'],
                  projectStatus: 'Spec Needed',
                  nextState: 'Spec Needed',
                  nextStage: 'Stage 6 Spec Preparation',
                },
                'needs-clarification': {
                  label: 'Needs Clarification',
                  add: ['needs-clarification'],
                  remove: [],
                  projectStatus: 'Needs Clarification',
                  nextState: 'Needs Clarification',
                  nextStage: 'Needs Clarification',
                },
                reject: {
                  label: 'Reject',
                  add: [],
                  remove: ['needs-human-review'],
                  projectStatus: 'Closed',
                  nextState: 'Closed',
                  nextStage: 'Closed',
                },
              },
              '7': {
                title: 'Stage 7 Product Spec Review Decision',
                approve: {
                  label: 'Approve',
                  add: ['product-spec-approved', 'needs-tech-spec'],
                  remove: ['needs-spec', 'spec-review'],
                  projectStatus: 'Technical Spec Needed',
                  nextState: 'Technical Spec Needed',
                  nextStage: 'Stage 8 Technical Specification Preparation',
                },
                'request-changes': {
                  label: 'Request Changes',
                  add: ['needs-spec'],
                  remove: ['spec-review'],
                  projectStatus: 'Spec Needed',
                  nextState: 'Spec Needed',
                  nextStage: 'Stage 6 Spec Preparation',
                },
                'needs-clarification': {
                  label: 'Needs Clarification',
                  add: ['needs-clarification'],
                  remove: ['spec-review'],
                  projectStatus: 'Needs Clarification',
                  nextState: 'Needs Clarification',
                  nextStage: 'Needs Clarification',
                },
                reject: {
                  label: 'Reject / No Longer Needed',
                  add: [],
                  remove: ['needs-spec', 'spec-review'],
                  projectStatus: 'Closed',
                  nextState: 'Closed',
                  nextStage: 'Closed',
                },
              },
              '9': {
                title: 'Stage 9 Technical Spec Review Decision',
                approve: {
                  label: 'Approve',
                  add: ['tech-spec-approved'],
                  remove: ['needs-tech-spec', 'technical-spec-review'],
                  projectStatus: 'Ready for Build',
                  nextState: 'Ready for Build',
                  nextStage: 'Stage 10 Implementation Coordination',
                },
                'request-changes': {
                  label: 'Request Changes',
                  add: ['needs-tech-spec'],
                  remove: ['technical-spec-review'],
                  projectStatus: 'Technical Spec Needed',
                  nextState: 'Technical Spec Needed',
                  nextStage: 'Stage 8 Technical Specification Preparation',
                },
                'needs-clarification': {
                  label: 'Needs Clarification',
                  add: ['needs-clarification'],
                  remove: ['technical-spec-review'],
                  projectStatus: 'Needs Clarification',
                  nextState: 'Needs Clarification',
                  nextStage: 'Needs Clarification',
                },
                reject: {
                  label: 'Reject / No Longer Needed',
                  add: [],
                  remove: ['needs-tech-spec', 'technical-spec-review'],
                  projectStatus: 'Closed',
                  nextState: 'Closed',
                  nextStage: 'Closed',
                },
              },
            };

            const stageConfig = matrix[stage];
            if (!stageConfig) { core.setFailed(`Unknown stage: ${stage}`); return; }
            const dc = stageConfig[decision];
            if (!dc) { core.setFailed(`"${decision}" not supported for Stage ${stage}`); return; }

            // ── Fetch issue ─────────────────────────────────────────
            const { data: issue } = await github.rest.issues.get({
              owner, repo, issue_number: issueNumber,
            });
            const labels = issue.labels.map(l => (typeof l === 'string' ? l : l.name)).filter(Boolean);

            // ── Find artifacts from existing comments ───────────────
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number: issueNumber, per_page: 100,
            });

            const extractUrls = (text) =>
              (text.match(/https:\/\/github\.com\/[^\s)>\]]+/gi) || [])
                .map(u => u.replace(/[\]>.,;:]+$/, ''));

            const findComment = (pattern) =>
              [...comments].reverse().find(c => pattern.test(c.body || ''));

            let techSpecArtifact = '';
            let productSpecArtifact = '';

            if (stage === '9') {
              const s8 = findComment(/Stage 8 Technical Spec Draft/i);
              if (s8) {
                const urls = extractUrls(s8.body || '');
                techSpecArtifact = urls[0] || s8.html_url;
                productSpecArtifact = urls[1] || '';
              }
              if (!productSpecArtifact) {
                const s6 = findComment(/Stage 6 Product Spec Draft/i);
                if (s6) productSpecArtifact = extractUrls(s6.body || '')[0] || s6.html_url;
              }
              if (!prNumber && techSpecArtifact) {
                const m = techSpecArtifact.match(/\/pull\/(\d+)/);
                if (m) prNumber = Number(m[1]);
              }
            } else if (stage === '7') {
              const s6 = findComment(/Stage 6 Product Spec Draft/i);
              if (s6) productSpecArtifact = extractUrls(s6.body || '')[0] || s6.html_url;
              if (!prNumber && productSpecArtifact) {
                const m = productSpecArtifact.match(/\/pull\/(\d+)/);
                if (m) prNumber = Number(m[1]);
              }
            }

            const missingProductSpec = '<missing: product spec artifact>';
            const missingTechnicalSpec = '<missing: technical spec artifact>';
            const knownProductSpec = productSpecArtifact || missingProductSpec;
            const knownTechSpec = techSpecArtifact || missingTechnicalSpec;
            const promptBlock = (prompt) => prompt ? ['', '## Next Codex Prompt', '', '```text', prompt, '```'] : [];
            const buildNextCodexPrompt = () => {
              if (decision !== 'approve') return null;

              if (stage === '5') {
                return [
                  'Run DUUMBI combined spec drafting with duumbi-spec-draft and duumbi-tech-spec-draft.',
                  '',
                  `Target issue: ${issueUrl}`,
                  `Expected artifacts: specs/DUUMBI-${issueNumber}/PRODUCT.md and specs/DUUMBI-${issueNumber}/TECHNICAL.md`,
                  '',
                  'Goal: Verify Stage 5 acceptance, inspect active DUUMBI context and relevant source context, draft the product spec in English with BDD Scenarios, then immediately draft the agent-facing technical spec with BDD-to-test mapping, live E2E plan, and Ralph Cycle resource policy. Do not wait for external review between the two specs. Run Codex self-review on both, record Stage 7 and Stage 9 gate decisions when the AI gates are clean, merge the spec-only PR(s), move the issue to Ready for Build, and send the Stage 10 implementation prompt. Optionally request a quick low-cost review on the spec PR (e.g. MiniMax, DeepSeek, Grok Build, Cursor BugBot); it is advisory only. Do not invoke Greptile; Greptile is reserved for the final implementation PR.',
                  '',
                  `Spec-only PR rule: use non-closing issue references such as "Related to #${issueNumber}" or "Spec for #${issueNumber}". Include a workflow note that this PR must leave the execution issue open.`,
                  '',
                  'Do not create implementation code or Ralph cycles. Stop with findings if a gate fails or blocking product/architecture questions remain.',
                ].join('\n');
              }

              if (stage === '7') {
                return [
                  'Run DUUMBI Stage 8 Technical Spec Draft with duumbi-tech-spec-draft, then run Stage 9 Technical Spec Review with duumbi-tech-spec-review in AI-gate mode when the gate requirements are satisfied; otherwise stop and request human approval.',
                  '',
                  `Target issue: ${issueUrl}`,
                  `Product spec artifact: ${knownProductSpec}`,
                  `Expected artifact: specs/DUUMBI-${issueNumber}/TECHNICAL.md`,
                  '',
                  'Goal: Verify product spec approval, inspect repo AGENTS.md and affected source areas, draft an agent-facing technical spec with BDD-to-test mapping, live E2E plan, and Ralph Cycle resource policy, open a technical spec PR, run Codex self-review, address blocking findings until checks are clean, link it from the issue, then record Stage 9 approval through the configured AI or human gate, merge the spec PR, move the issue to Ready for Build, and send the Stage 10 prompt. Do not wait for external automated reviewers; a quick low-cost review (e.g. MiniMax, DeepSeek, Grok Build, Cursor BugBot) is optional and advisory. Do not invoke Greptile; it is reserved for the final implementation PR.',
                  '',
                  `Spec-only PR rule: use non-closing issue references such as "Related to #${issueNumber}" or "Technical spec for #${issueNumber}". Include a workflow note that this PR must leave the execution issue open.`,
                  '',
                  'Do not modify implementation code, tests, generated artifacts, runtime assets, or product specs. Do not bypass Stage 9 approval, do not approve if the AI/human gate is missing, and do not run Ralph cycles.',
                ].join('\n');
              }

              if (stage === '9') {
                return [
                  'Run DUUMBI Stage 10 Implementation Coordination with duumbi-implementation.',
                  '',
                  `Target issue: ${issueUrl}`,
                  'Mode: coordinate Stage 10 branch, PR, blocker, or evidence state',
                  `Product spec artifact: ${knownProductSpec}`,
                  `Technical spec artifact: ${knownTechSpec}`,
                  '',
                  'Goal: Verify Ready for Build context, manage branch and PR readiness, consolidate Ralph-cycle evidence when relevant, choose the next routed action, and delegate implementation edits only through bounded Ralph cycles.',
                  '',
                  'Do not exceed the approved product or technical specs, skip resource gates, perform Stage 12 closure, merge PRs, or mark the issue done.',
                ].join('\n');
              }

              return null;
            };
            const nextCodexPrompt = buildNextCodexPrompt();

            const approvalSpecPrPolicy = () => {
              if (decision !== 'approve') return null;
              if (stage === '7') {
                return {
                  stageLabel: 'Stage 7',
                  kind: 'product spec',
                  artifact: productSpecArtifact,
                  allowIssueCommentArtifact: true,
                  expectedPath: `specs/DUUMBI-${issueNumber}/PRODUCT.md`,
                  safeCommitTitle: `Spec for #${issueNumber}: product spec`,
                  safeCommitMessage: `Related to #${issueNumber}.\n\nSpec-only Stage 7 approval merge. The execution issue remains open for Stage 8 and later workflow stages.`,
                };
              }
              if (stage === '9') {
                return {
                  stageLabel: 'Stage 9',
                  kind: 'technical spec',
                  artifact: techSpecArtifact,
                  allowIssueCommentArtifact: false,
                  expectedPath: `specs/DUUMBI-${issueNumber}/TECHNICAL.md`,
                  safeCommitTitle: `Technical spec for #${issueNumber}`,
                  safeCommitMessage: `Related to #${issueNumber}.\n\nSpec-only Stage 9 approval merge. The execution issue remains open for Stage 10 and later workflow stages.`,
                };
              }
              return null;
            };

            const latestReviewsByActor = (reviews) => {
              const latest = new Map();
              for (const review of reviews) {
                const actor = review.user?.login || `review-${review.id}`;
                const previous = latest.get(actor);
                const submitted = Date.parse(review.submitted_at || review.submittedAt || 0);
                const previousSubmitted = Date.parse(previous?.submitted_at || previous?.submittedAt || 0);
                if (!previous || submitted >= previousSubmitted) latest.set(actor, review);
              }
              return [...latest.values()];
            };

            // Spec PRs have no required automated reviewer by default; the gate
            // relies on Codex self-review plus checks. Keep quota-limited manual
            // reviewers such as Greptile out of DUUMBI_REQUIRED_SPEC_REVIEWERS.
            const requiredAutomatedReviewers = () =>
              String(process.env.DUUMBI_REQUIRED_SPEC_REVIEWERS || '')
                .split(',')
                .map((reviewer) => reviewer.trim())
                .filter(Boolean);

            const normalizeReviewerLogin = (login) =>
              String(login || '').trim().toLowerCase().replace(/\[bot\]$/, '');

            const validReviewEvidenceStates = new Set(['APPROVED', 'COMMENTED', 'CHANGES_REQUESTED']);

            const missingRequiredReviewers = (latestReviews) => {
              const reviewActors = new Set(
                latestReviews
                  .filter((review) => validReviewEvidenceStates.has(String(review.state || '').toUpperCase()))
                  .map((review) => normalizeReviewerLogin(review.user?.login))
                  .filter(Boolean),
              );
              return requiredAutomatedReviewers().filter((reviewer) => !reviewActors.has(normalizeReviewerLogin(reviewer)));
            };

            const findUnresolvedReviewThreads = async (pullNumber) => {
              const unresolved = [];
              let cursor = null;
              do {
                const data = await github.graphql(`
                  query($owner: String!, $repo: String!, $number: Int!, $cursor: String) {
                    repository(owner: $owner, name: $repo) {
                      pullRequest(number: $number) {
                        reviewThreads(first: 100, after: $cursor) {
                          pageInfo { hasNextPage endCursor }
                          nodes {
                            isResolved
                            isOutdated
                            comments(first: 1) {
                              nodes {
                                url
                                author { login }
                              }
                            }
                          }
                        }
                      }
                    }
                  }`,
                  { owner, repo, number: pullNumber, cursor },
                );
                const threads = data.repository?.pullRequest?.reviewThreads;
                for (const thread of threads?.nodes || []) {
                  if (!thread.isResolved) {
                    const firstComment = thread.comments?.nodes?.[0];
                    const state = thread.isOutdated ? 'outdated unresolved' : 'active unresolved';
                    unresolved.push(`${firstComment?.url || `review thread by ${firstComment?.author?.login || 'unknown'}`} (${state})`);
                  }
                }
                cursor = threads?.pageInfo?.hasNextPage ? threads.pageInfo.endCursor : null;
              } while (cursor);
              return unresolved;
            };

            const validateAndMergeSpecPr = async (policy) => {
              if (!policy) return null;
              if (!prNumber) {
                const artifact = String(policy.artifact || '');
                if (policy.allowIssueCommentArtifact && artifact && !artifact.includes('/pull/') && !artifact.startsWith('<missing:')) {
                  return {
                    prNumber: 0,
                    prUrl: 'not applicable',
                    mergeSha: 'not applicable',
                    expectedPath: policy.expectedPath,
                    checkCount: 0,
                    reviewCount: 0,
                    requiredReviewers: [],
                    issueCommentArtifact: true,
                  };
                }
                throw new Error(`${policy.stageLabel} approval requires an associated ${policy.kind} PR so approval can merge the reviewed artifact.`);
              }

              const prUrl = `https://github.com/${owner}/${repo}/pull/${prNumber}`;
              const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
              const alreadyMerged = pr.state !== 'open' && pr.merged;
              if (pr.state !== 'open' && !alreadyMerged) throw new Error(`${policy.kind} PR #${prNumber} is not open.`);
              if (!alreadyMerged && pr.draft) throw new Error(`${policy.kind} PR #${prNumber} is still draft; mark it ready for review and finish review fixes before approval.`);
              if (pr.base?.repo?.full_name !== `${owner}/${repo}`) {
                throw new Error(`${policy.kind} PR #${prNumber} targets ${pr.base?.repo?.full_name || 'unknown'}, not ${owner}/${repo}.`);
              }

              const closingPattern = new RegExp(`\\b(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\\s+#${issueNumber}\\b`, 'i');
              const closingSurfaces = [
                ['PR title', pr.title || ''],
                ['PR body', pr.body || ''],
              ];
              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner, repo, pull_number: prNumber, per_page: 100,
              });
              const changedPaths = files.map((file) => file.filename);
              const invalidFiles = files.filter((file) =>
                file.filename !== policy.expectedPath || file.status === 'removed'
              );
              for (const file of files) {
                closingSurfaces.push([`patch ${file.filename}`, file.patch || '']);
              }
              const commits = await github.paginate(github.rest.pulls.listCommits, {
                owner, repo, pull_number: prNumber, per_page: 100,
              });
              for (const commit of commits) {
                closingSurfaces.push([`commit ${commit.sha}`, commit.commit?.message || '']);
              }
              const closingHit = closingSurfaces.find(([, text]) => closingPattern.test(text));
              if (closingHit) throw new Error(`${policy.kind} PR #${prNumber} uses an issue-closing reference in ${closingHit[0]}; use "Related to #${issueNumber}" style wording.`);
              if (invalidFiles.length > 0 || files.length !== 1) {
                throw new Error(`${policy.kind} PR #${prNumber} must change only ${policy.expectedPath}; found ${changedPaths.join(', ') || 'no files'}.`);
              }

              const checkRuns = [];
              for (let page = 1; ; page += 1) {
                const response = await github.rest.checks.listForRef({
                  owner,
                  repo,
                  ref: pr.head.sha,
                  per_page: 100,
                  page,
                });
                const pageRuns = response.data.check_runs || [];
                checkRuns.push(...pageRuns);
                if (pageRuns.length < 100) break;
              }
              const ignoredSpecGateCheckNames = new Set([
                // These checks are created by the approval/closure automation itself
                // after a spec PR is merged. They are not pre-merge artifact evidence.
                'Execute approval',
                'Dispatch Stage 12 closure prompt',
              ]);
              const relevantCheckRuns = checkRuns.filter((check) =>
                !ignoredSpecGateCheckNames.has(String(check.name || ''))
              );
              const badChecks = relevantCheckRuns.filter((check) =>
                check.status !== 'completed' || !['success', 'neutral', 'skipped'].includes(check.conclusion)
              );
              const { data: combinedStatus } = await github.rest.repos.getCombinedStatusForRef({
                owner, repo, ref: pr.head.sha,
              });
              const statuses = combinedStatus.statuses || [];
              const badStatuses = statuses.filter((status) => status.state !== 'success');
              if (relevantCheckRuns.length + statuses.length === 0) {
                throw new Error(`${policy.kind} PR #${prNumber} has no check runs or status contexts; approval requires verifiable green checks.`);
              }
              if (badChecks.length > 0) {
                throw new Error(`Checks are not green on ${policy.kind} PR #${prNumber}: ${badChecks.map((check) => `${check.name}:${check.status}/${check.conclusion}`).join(', ')}`);
              }
              if (badStatuses.length > 0) {
                throw new Error(`Status contexts are not green on ${policy.kind} PR #${prNumber}: ${badStatuses.map((status) => `${status.context}:${status.state}`).join(', ')}`);
              }

              const reviews = await github.paginate(github.rest.pulls.listReviews, {
                owner, repo, pull_number: prNumber, per_page: 100,
              });
              const latestReviews = latestReviewsByActor(reviews);
              const blockingReviews = latestReviews.filter((review) => review.state === 'CHANGES_REQUESTED');
              const missingReviewers = missingRequiredReviewers(latestReviews);
              if (missingReviewers.length > 0) {
                throw new Error(`${policy.kind} PR #${prNumber} is missing required automated review evidence from: ${missingReviewers.join(', ')}. A review-request check is not enough; approval waits for actual reviewer submissions and fixes. Greptile is manual-only and must not be used to satisfy this default gate unless a human explicitly configured it.`);
              }
              if (blockingReviews.length > 0) {
                throw new Error(`${policy.kind} PR #${prNumber} has blocking review decisions: ${blockingReviews.map((review) => `${review.user?.login || 'unknown'}:${review.state}`).join(', ')}`);
              }

              const unresolvedThreads = await findUnresolvedReviewThreads(prNumber);
              if (unresolvedThreads.length > 0) {
                throw new Error(`${policy.kind} PR #${prNumber} has unresolved review threads: ${unresolvedThreads.slice(0, 5).join(', ')}`);
              }

              if (alreadyMerged) {
                return {
                  prNumber,
                  prUrl,
                  mergeSha: pr.merge_commit_sha || '',
                  expectedPath: policy.expectedPath,
                  checkCount: relevantCheckRuns.length + statuses.length,
                  reviewCount: latestReviews.length,
                  requiredReviewers: requiredAutomatedReviewers(),
                  alreadyMerged: true,
                };
              }

              const merge = await github.rest.pulls.merge({
                owner,
                repo,
                pull_number: prNumber,
                merge_method: 'squash',
                commit_title: policy.safeCommitTitle,
                commit_message: policy.safeCommitMessage,
              });

              return {
                prNumber,
                prUrl,
                mergeSha: merge.data.sha || '',
                expectedPath: policy.expectedPath,
                checkCount: relevantCheckRuns.length + statuses.length,
                reviewCount: latestReviews.length,
                requiredReviewers: requiredAutomatedReviewers(),
              };
            };

            specPrMerge = await validateAndMergeSpecPr(approvalSpecPrPolicy());

            // ── Build decision comment ──────────────────────────────
            const lines = [`## ${stageConfig.title}`, ''];
            lines.push(`**Decision:** ${dc.label}`);
            lines.push(`**Reviewer source:** ${reviewer}`);

            if (stage === '5') {
              lines.push(`**Rationale:** ${rationale}`);
              lines.push(`**Stage 4 recommendation considered:** yes`);
              lines.push(`**Remaining open questions:** none`);
              lines.push(`**Canonical duplicate:** none`);
              lines.push(`**Review date:** ${today}`);
            } else if (stage === '7') {
              lines.push(`**Spec artifact:** ${productSpecArtifact || 'not found'}`);
              lines.push(`**Spec PR:** ${specPrMerge?.prUrl || 'not merged'}`);
              lines.push(`**Spec PR merge SHA:** ${specPrMerge?.mergeSha || 'not merged'}`);
              lines.push(`**Rationale:** ${rationale}`);
              lines.push(`**Blocking findings:** none`);
              lines.push(`**Non-blocking findings:** none`);
              lines.push(`**Remaining open questions:** none`);
            } else if (stage === '9') {
              lines.push(`**Technical spec:** ${techSpecArtifact || 'not found'}`);
              lines.push(`**Product spec:** ${productSpecArtifact || 'not found'}`);
              lines.push(`**Technical spec PR:** ${specPrMerge?.prUrl || 'not merged'}`);
              lines.push(`**Technical spec PR merge SHA:** ${specPrMerge?.mergeSha || 'not merged'}`);
              lines.push(`**Rationale:** ${rationale}`);
              lines.push(`**Blocking findings:** none`);
              lines.push(`**Non-blocking findings:** none`);
              lines.push(`**Remaining open questions:** none`);
            }
            lines.push(`**Next state:** ${dc.nextState}`);
            lines.push(...promptBlock(nextCodexPrompt));
            const decisionCommentBody = lines.join('\n');

            const matchingDecisionComment = (comment) => {
              const body = comment.body || '';
              return body.includes(`## ${stageConfig.title}`)
                && body.includes(`**Decision:** ${dc.label}`)
                && body.includes(`**Next state:** ${dc.nextState}`);
            };

            // ── Post or reuse decision comment ──────────────────────
            let posted = [...comments].reverse().find(matchingDecisionComment);
            const reusedDecisionComment = Boolean(posted);
            if (posted) {
              core.info(`Decision comment already exists: ${posted.html_url}`);
            } else {
              const { data } = await github.rest.issues.createComment({
                owner, repo, issue_number: issueNumber, body: decisionCommentBody,
              });
              posted = data;
              core.info(`Decision comment: ${posted.html_url}`);
            }

            // ── Post PR pointer comment (stages 7/9) ────────────────
            let prCommentUrl = '';
            if (prNumber && (stage === '7' || stage === '9')) {
              try {
                const prPointerBody = [
                  `## ${stageConfig.title}`,
                  '',
                  `**Decision:** ${dc.label}`,
                  `**Issue:** ${issueUrl}`,
                  `**Decision comment:** ${posted.html_url}`,
                  specPrMerge?.mergeSha ? `**Merge SHA:** ${specPrMerge.mergeSha}` : null,
                ].filter(Boolean).join('\n');
                const prComments = await github.paginate(github.rest.issues.listComments, {
                  owner, repo, issue_number: prNumber, per_page: 100,
                });
                const existingPrComment = [...prComments].reverse().find((comment) => {
                  const body = comment.body || '';
                  return body.includes(`## ${stageConfig.title}`)
                    && body.includes(`**Decision:** ${dc.label}`)
                    && body.includes(`**Issue:** ${issueUrl}`);
                });
                if (existingPrComment) {
                  prCommentUrl = existingPrComment.html_url;
                  core.info(`PR comment already exists: ${prCommentUrl}`);
                } else {
                  const { data: prc } = await github.rest.issues.createComment({
                    owner, repo, issue_number: prNumber, body: prPointerBody,
                  });
                  prCommentUrl = prc.html_url;
                  core.info(`PR comment: ${prCommentUrl}`);
                }
              } catch (err) {
                core.warning(`PR #${prNumber} comment failed: ${err.message}`);
              }
            }

            // ── Close issue on reject ────────────────────────────────
            if (decision === 'reject') {
              try {
                await github.rest.issues.update({ owner, repo, issue_number: issueNumber, state: 'closed' });
                core.info(`Issue #${issueNumber} closed.`);
              } catch (err) {
                core.warning(`Close issue failed: ${err.message}`);
              }
            }

            // ── Update labels ───────────────────────────────────────
            const currentLabels = new Set(labels);
            for (const rm of dc.remove) {
              if (currentLabels.has(rm)) {
                try {
                  await github.rest.issues.removeLabel({ owner, repo, issue_number: issueNumber, name: rm });
                  core.info(`Label removed: ${rm}`);
                } catch (err) {
                  core.warning(`Remove label "${rm}": ${err.message}`);
                }
              }
            }
            for (const add of dc.add) {
              if (!currentLabels.has(add)) {
                try {
                  await github.rest.issues.addLabels({ owner, repo, issue_number: issueNumber, labels: [add] });
                  core.info(`Label added: ${add}`);
                } catch (err) {
                  core.warning(`Add label "${add}": ${err.message}`);
                }
              }
            }

            // ── Project V2 status update ────────────────────────────
            let projectUpdated = false;
            const projectPat = process.env.GH_PROJECT_PAT;
            if (projectPat && dc.projectStatus) {
              try {
                const gql = async (query, variables) => {
                  const res = await fetch('https://api.github.com/graphql', {
                    method: 'POST',
                    headers: {
                      Authorization: `bearer ${projectPat}`,
                      'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ query, variables }),
                  });
                  const json = await res.json();
                  if (json.errors) throw new Error(json.errors.map(e => e.message).join('; '));
                  return json.data;
                };

                // Find project items for the issue
                const itemsData = await gql(`
                  query($owner: String!, $repo: String!, $number: Int!) {
                    repository(owner: $owner, name: $repo) {
                      issue(number: $number) {
                        projectItems(first: 10) {
                          nodes { id project { id title } }
                        }
                      }
                    }
                  }`, { owner, repo, number: issueNumber });

                const items = itemsData.repository?.issue?.projectItems?.nodes || [];
                for (const item of items) {
                  // Find the Status field and target option
                  const fieldsData = await gql(`
                    query($pid: ID!) {
                      node(id: $pid) {
                        ... on ProjectV2 {
                          fields(first: 30) {
                            nodes {
                              ... on ProjectV2SingleSelectField { id name options { id name } }
                            }
                          }
                        }
                      }
                    }`, { pid: item.project.id });

                  const statusField = fieldsData.node?.fields?.nodes?.find(f => f.name === 'Status');
                  if (!statusField) continue;

                  const opt = statusField.options.find(o => o.name === dc.projectStatus);
                  if (!opt) {
                    core.warning(`Status option "${dc.projectStatus}" not found in "${item.project.title}".`);
                    continue;
                  }

                  await gql(`
                    mutation($pid: ID!, $iid: ID!, $fid: ID!, $oid: String!) {
                      updateProjectV2ItemFieldValue(input: {
                        projectId: $pid, itemId: $iid, fieldId: $fid,
                        value: { singleSelectOptionId: $oid }
                      }) { projectV2Item { id } }
                    }`, { pid: item.project.id, iid: item.id, fid: statusField.id, oid: opt.id });

                  projectUpdated = true;
                  core.info(`Project "${item.project.title}" → ${dc.projectStatus}`);
                }
              } catch (err) {
                core.warning(`Project V2 update failed: ${err.message}`);
              }
            } else if (!projectPat) {
              core.info('GH_PROJECT_PAT not set — skipping Project V2 update.');
            }

            // ── Notify Slack ────────────────────────────────────────
            const decisionEmoji = {
              approve: '✅', 'request-changes': '✏️',
              'needs-clarification': '❓', reject: '🚫',
            }[decision] || 'ℹ️';
            const slackEscape = (s) => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            const safeTitle = slackEscape(issue.title).slice(0, 60);
            const summary = [
              `${decisionEmoji} Stage ${stage} *${dc.label}* — <${issueUrl}|#${issueNumber} ${safeTitle}>`,
              `• Decision comment: ${posted.html_url}`,
              prCommentUrl ? `• PR comment: ${prCommentUrl}` : null,
              specPrMerge?.mergeSha ? `• Spec PR merged: ${specPrMerge.mergeSha}` : null,
              `• Labels: +[${dc.add.join(', ')}] −[${dc.remove.join(', ')}]`,
              `• Project: ${projectUpdated ? dc.projectStatus : '_not updated_'}`,
              `• Next: ${dc.nextStage}`,
              nextCodexPrompt ? ['', 'Next Codex prompt:', '```', nextCodexPrompt, '```'].join('\n') : null,
            ].filter(Boolean).join('\n');

            // Reply in Slack thread via response_url (from button click)
            const slackResponseUrl = process.env.INPUT_SLACK_RESPONSE_URL;
            if (slackResponseUrl) {
              try {
                await fetch(slackResponseUrl, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ text: summary, replace_original: false }),
                });
              } catch (err) {
                core.warning(`Slack response_url failed: ${err.message}`);
              }
            }

            // Post to review channel
            const slackToken = process.env.SLACK_BOT_TOKEN;
            const slackChannel = process.env.SLACK_REVIEW_CHANNEL_ID;
            if (slackToken && slackChannel && !(context.eventName === 'pull_request' && reusedDecisionComment)) {
              try {
                const res = await fetch('https://slack.com/api/chat.postMessage', {
                  method: 'POST',
                  headers: {
                    Authorization: `Bearer ${slackToken}`,
                    'Content-Type': 'application/json; charset=utf-8',
                  },
                  body: JSON.stringify({ channel: slackChannel, text: summary }),
                });
                const body = await res.json();
                if (!body.ok) core.warning(`Slack: ${body.error}`);
              } catch (err) {
                core.warning(`Slack notification failed: ${err.message}`);
              }
            } else if (context.eventName === 'pull_request' && reusedDecisionComment) {
              core.info('Skipping duplicate Slack summary for already-recorded pull_request approval.');
            }

            // ── Workflow summary ─────────────────────────────────────
            const summaryBuilder = core.summary
              .addHeading(`Stage ${stage} ${dc.label} — #${issueNumber}`, 2)
              .addTable([
                [{data: 'Field', header: true}, {data: 'Value', header: true}],
                ['Decision', dc.label],
                ['Comment', posted.html_url],
                ['Labels added', dc.add.join(', ') || 'none'],
                ['Labels removed', dc.remove.join(', ') || 'none'],
                ['Project V2', projectUpdated ? dc.projectStatus : 'not updated'],
                ['Next stage', dc.nextStage],
              ]);
            if (nextCodexPrompt) {
              summaryBuilder
                .addHeading('Next Codex Prompt', 3)
                .addCodeBlock(nextCodexPrompt, 'text');
            }
            await summaryBuilder.write();

      - name: Write DUUMBI workflow metrics
        if: always()
        continue-on-error: true
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        env:
          DUUMBI_JOB_STATUS: ${{ job.status }}
          DUUMBI_METRICS_PATH: duumbi-workflow-metrics.json
        with:
          script: |
            const fs = require('fs');
            const path = process.env.DUUMBI_METRICS_PATH || 'duumbi-workflow-metrics.json';
            const { owner, repo } = context.repo;
            const payload = context.payload || {};
            const raw = context.eventName === 'repository_dispatch'
              ? (payload.client_payload || {})
              : (payload.inputs || {});

            const asNumber = (value) => {
              const n = Number(value);
              return Number.isFinite(n) && n > 0 ? n : null;
            };
            const durationMs = (start, end) => {
              if (!start || !end) return null;
              const ms = new Date(end).getTime() - new Date(start).getTime();
              return Number.isFinite(ms) && ms >= 0 ? ms : null;
            };
            const now = new Date().toISOString();

            let jobs = [];
            let warning = null;
            try {
              jobs = await github.paginate(github.rest.actions.listJobsForWorkflowRun, {
                owner, repo, run_id: context.runId, per_page: 100,
              });
            } catch (err) {
              warning = `job metadata unavailable: ${String(err.message || err).slice(0, 160)}`;
              core.warning(warning);
            }

            const phases = jobs.map((job) => {
              const completedAt = job.completed_at || (job.name === 'Execute approval' ? now : null);
              const conclusion = job.name === 'Execute approval'
                ? String(process.env.DUUMBI_JOB_STATUS || job.conclusion || job.status || 'unknown')
                : (job.conclusion || job.status || 'unknown');
              return {
                name: job.name,
                conclusion,
                started_at: job.started_at || null,
                completed_at: completedAt,
                duration_ms: durationMs(job.started_at, completedAt),
                warning_count: null,
                failure_count: conclusion === 'failure' ? 1 : 0,
              };
            });

            if (phases.length === 0) {
              phases.push({
                name: 'Execute approval',
                conclusion: String(process.env.DUUMBI_JOB_STATUS || 'unknown'),
                started_at: null,
                completed_at: now,
                duration_ms: null,
                warning_count: warning ? 1 : null,
                failure_count: process.env.DUUMBI_JOB_STATUS === 'failure' ? 1 : 0,
              });
            }

            const starts = phases.map((p) => p.started_at).filter(Boolean).sort();
            const ends = phases.map((p) => p.completed_at).filter(Boolean).sort();
            const startedAt = starts[0] || null;
            const completedAt = ends[ends.length - 1] || now;
            const workflowStatus = String(process.env.DUUMBI_JOB_STATUS || 'unknown');

            const metrics = {
              schema_version: 'duumbi.workflow_metrics.v1',
              generated_at: now,
              source: 'github_actions',
              repository: `${owner}/${repo}`,
              workflow: {
                name: context.workflow,
                file: '.github/workflows/stage-approval.yml',
                run_id: context.runId,
                run_attempt: Number(process.env.GITHUB_RUN_ATTEMPT || 1),
                event_name: context.eventName,
                actor: context.actor,
                ref: context.ref,
                sha: context.sha,
                conclusion: workflowStatus,
                started_at: startedAt,
                completed_at: completedAt,
                duration_ms: durationMs(startedAt, completedAt),
              },
              correlation: {
                issue_number: asNumber(raw.issue_number),
                pr_number: asNumber(raw.pr_number),
                stage: raw.stage ? String(raw.stage) : null,
                decision: raw.decision ? String(raw.decision) : null,
                project_status: null,
              },
              phases,
              counts: {
                issues_considered: null,
                issues_queued: null,
                slack_notifications_attempted: null,
                artifact_links_found: null,
                artifact_links_missing: null,
              },
              provider_usage: {
                available: false,
                reason: 'no_provider_step',
                provider: null,
                model: null,
                request_count: null,
                prompt_tokens: null,
                completion_tokens: null,
                total_tokens: null,
                estimated_cost_usd: null,
                latency_ms: null,
                failure_count: null,
              },
              privacy: {
                metadata_only: true,
                raw_prompts_included: false,
                raw_completions_included: false,
                raw_slack_payloads_included: false,
                secrets_included: false,
              },
              warnings: warning ? [warning] : [],
            };

            fs.writeFileSync(path, `${JSON.stringify(metrics, null, 2)}\n`);

            await core.summary
              .addHeading('DUUMBI Workflow Metrics', 2)
              .addTable([
                [{ data: 'Field', header: true }, { data: 'Value', header: true }],
                ['Artifact', `duumbi-workflow-metrics-stage-approval-${context.runId}-${process.env.GITHUB_RUN_ATTEMPT || 1}`],
                ['Workflow conclusion', workflowStatus],
                ['Duration ms', String(metrics.workflow.duration_ms ?? 'unavailable')],
                ['Issue', String(metrics.correlation.issue_number ?? 'unavailable')],
                ['Stage', String(metrics.correlation.stage ?? 'unavailable')],
                ['Decision', String(metrics.correlation.decision ?? 'unavailable')],
                ['Provider usage', 'unavailable: no_provider_step'],
              ])
              .write();

      - name: Upload DUUMBI workflow metrics
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: duumbi-workflow-metrics-stage-approval-${{ github.run_id }}-${{ github.run_attempt }}
          path: duumbi-workflow-metrics.json
          if-no-files-found: warn
