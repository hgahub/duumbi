name: Copilot Review (Default PR Gate)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  pull-requests: write

jobs:
  request-copilot-review:
    name: Request Copilot Review
    runs-on: ubuntu-latest
    steps:
      - name: Request Copilot reviewer
        uses: actions/github-script@v9
        with:
          script: |
            // Copilot is DUUMBI's default low-cost automated reviewer.
            // Greptile is configured separately as manual-only for scarce,
            // high-risk deep reviews; this workflow must not invoke it.
            try {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                reviewers: ["copilot"],
              });
              core.info("Copilot reviewer requested.");
            } catch (error) {
              core.warning(`Could not request Copilot reviewer: ${error.message}`);
            }
