name: Stage 12 Closure Dispatch

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Merged implementation PR number
        required: true
        type: number
      issue_number:
        description: Optional linked issue number
        required: false
        type: number
        default: 0

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: stage12-closure-dispatch-${{ github.event.pull_request.number || inputs.pr_number || github.run_id }}
  cancel-in-progress: false

jobs:
  dispatch:
    name: Dispatch Stage 12 closure prompt
    if: github.event_name != 'pull_request' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Build and send closure dispatch
        uses: actions/github-script@v9
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_REVIEW_CHANNEL_ID: ${{ secrets.SLACK_REVIEW_CHANNEL_ID }}
          DUUMBI_AGENT_DISPATCH_CHANNEL_ID: ${{ secrets.DUUMBI_AGENT_DISPATCH_CHANNEL_ID }}
          DUUMBI_METRICS_PATH: duumbi-workflow-metrics.json
        with:
          script: |
            const fs = require("fs");
            const { owner, repo } = context.repo;
            const eventName = context.eventName;
            const inputs = context.payload.inputs || {};
            const warnings = [];

            const issueUrlFor = (issueNumber) => `${context.serverUrl}/${owner}/${repo}/issues/${issueNumber}`;
            const prUrlFor = (prNumber) => `${context.serverUrl}/${owner}/${repo}/pull/${prNumber}`;
            const markerFor = (prNumber, mergeSha) =>
              `<!-- duumbi-stage12-closure-dispatch:v1 pr=${prNumber} merge_sha=${mergeSha || "unknown"} -->`;

            const extractIssueNumbers = (text) => {
              const value = String(text || "");
              const numbers = [];
              const patterns = [
                /\b(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?|related to|supports|linked issue|issue)\s+#(\d+)\b/gi,
                /https:\/\/github\.com\/[^/\s]+\/[^/\s]+\/issues\/(\d+)/gi,
              ];
              for (const pattern of patterns) {
                for (const match of value.matchAll(pattern)) {
                  numbers.push(Number(match[1]));
                }
              }
              return [...new Set(numbers.filter((number) => Number.isInteger(number) && number > 0))];
            };

            const prNumber = eventName === "pull_request"
              ? Number(context.payload.pull_request.number)
              : Number(inputs.pr_number || 0);
            if (!Number.isInteger(prNumber) || prNumber < 1) {
              core.setFailed(`Invalid pr_number: ${inputs.pr_number || "<missing>"}`);
              return;
            }

            const { data: pull } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prNumber,
            });
            if (!pull.merged) {
              core.setFailed(`PR #${prNumber} is not merged; Stage 12 closure requires verified completion evidence.`);
              return;
            }

            const explicitIssue = Number(inputs.issue_number || 0);
            const linkedIssueNumbers = explicitIssue > 0
              ? [explicitIssue]
              : extractIssueNumbers([pull.title || "", pull.body || ""].join("\n"));
            const issueNumber = linkedIssueNumbers[0] || null;
            if (!issueNumber) {
              warnings.push("linked_issue_not_detected");
            }

            const prComments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: prNumber,
              per_page: 100,
            });
            const marker = markerFor(prNumber, pull.merge_commit_sha || "");
            if (prComments.some((comment) => String(comment.body || "").includes(marker))) {
              core.info(`Stage 12 closure dispatch already recorded for PR #${prNumber}.`);
              return;
            }

            const prompt = [
              "Run DUUMBI Stage 12 Closure with duumbi-closure.",
              "",
              `Merged PR or completion evidence: ${pull.html_url || prUrlFor(prNumber)}`,
              issueNumber
                ? `Linked issue: ${issueUrlFor(issueNumber)}`
                : "Linked issue: <not detected; inspect PR references before closing any issue>",
              `Merge SHA: ${pull.merge_commit_sha || "unavailable"}`,
              "",
              "Goal: Verify merge evidence, Stage 11 review artifact, approved product spec, approved technical spec, checks, and final human decision. Add closure evidence to the issue, set Project status to Done when available, close the issue when appropriate, update source surfaces when available, process related Inbox notes if any, and decide whether durable knowledge sync is needed.",
              "",
              "Do not merge PRs, start implementation, rewrite specs, or claim Done without verified completion evidence.",
            ].join("\n");

            const token = process.env.SLACK_BOT_TOKEN;
            const channel = process.env.DUUMBI_AGENT_DISPATCH_CHANNEL_ID || process.env.SLACK_REVIEW_CHANNEL_ID;
            if (!token || !channel) {
              core.setFailed("Slack dispatch is not configured; Stage 12 closure prompt was not sent.");
              return;
            }

            const response = await fetch("https://slack.com/api/chat.postMessage", {
              method: "POST",
              headers: {
                Authorization: `Bearer ${token}`,
                "Content-Type": "application/json; charset=utf-8",
              },
              body: JSON.stringify({
                channel,
                text: [
                  "*DUUMBI Stage 12 Closure Dispatch*",
                  `*Repository:* ${owner}/${repo}`,
                  `*Merged PR:* <${pull.html_url || prUrlFor(prNumber)}|#${prNumber}>`,
                  issueNumber ? `*Linked issue:* <${issueUrlFor(issueNumber)}|#${issueNumber}>` : "*Linked issue:* not detected",
                  "",
                  "```",
                  prompt,
                  "```",
                ].join("\n"),
              }),
            });
            const body = await response.json();
            if (!response.ok || !body.ok) {
              core.setFailed(`Slack chat.postMessage failed: ${body.error || response.status}`);
              return;
            }

            const markerBody = [
              marker,
              "Stage 12 closure dispatch requested through GitHub Actions after PR merge.",
              "",
              `Workflow run: ${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`,
              `Slack timestamp: ${body.ts || "<unavailable>"}`,
              issueNumber ? `Linked issue: ${issueUrlFor(issueNumber)}` : "Linked issue: not detected",
            ].join("\n");
            const { data: prComment } = await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: prNumber,
              body: markerBody,
            });

            let issueCommentUrl = "";
            if (issueNumber) {
              try {
                const { data: issueComment } = await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  body: [
                    marker,
                    "Stage 12 closure dispatch requested after linked PR merge.",
                    "",
                    `Merged PR: ${pull.html_url || prUrlFor(prNumber)}`,
                    `Workflow run: ${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`,
                  ].join("\n"),
                });
                issueCommentUrl = issueComment.html_url;
              } catch (error) {
                warnings.push(`issue_comment_failed:${error.message}`);
                core.warning(`Issue closure-dispatch comment failed: ${error.message}`);
              }
            }

            const now = new Date().toISOString();
            fs.writeFileSync(process.env.DUUMBI_METRICS_PATH, `${JSON.stringify({
              schema_version: "duumbi.workflow_metrics.v1",
              generated_at: now,
              source: "github_actions",
              repository: `${owner}/${repo}`,
              workflow: {
                name: context.workflow,
                file: ".github/workflows/stage12-closure-dispatch.yml",
                run_id: context.runId,
                run_attempt: Number(process.env.GITHUB_RUN_ATTEMPT || 1),
                event_name: eventName,
                actor: context.actor,
                ref: context.ref,
                sha: context.sha,
                conclusion: "success",
                started_at: now,
                completed_at: now,
                duration_ms: null,
              },
              correlation: {
                issue_number: issueNumber,
                pr_number: prNumber,
                stage: "12",
                decision: "closure_dispatch",
                project_status: null,
              },
              counts: {
                issues_considered: issueNumber ? 1 : 0,
                issues_queued: 1,
                slack_notifications_attempted: 1,
                artifact_links_found: issueNumber ? 2 : 1,
                artifact_links_missing: issueNumber ? 0 : 1,
              },
              provider_usage: {
                available: false,
                reason: "agent_dispatch_only",
              },
              privacy: {
                metadata_only: true,
                raw_prompts_included: false,
                raw_completions_included: false,
                raw_slack_payloads_included: false,
                secrets_included: false,
              },
              warnings,
            }, null, 2)}\n`);

            await core.summary
              .addHeading("DUUMBI Stage 12 Closure Dispatch", 2)
              .addTable([
                [{ data: "Field", header: true }, { data: "Value", header: true }],
                ["PR", `#${prNumber}`],
                ["Linked issue", issueNumber ? `#${issueNumber}` : "not detected"],
                ["PR marker comment", prComment.html_url],
                ["Issue marker comment", issueCommentUrl || "not applicable"],
                ["Slack dispatch", "posted"],
              ])
              .write();

      - name: Upload DUUMBI workflow metrics
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: duumbi-workflow-metrics-stage12-closure-dispatch-${{ github.run_id }}-${{ github.run_attempt }}
          path: duumbi-workflow-metrics.json
          if-no-files-found: warn
