name: Stage 11 Merge Decision

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: Linked GitHub issue number
        required: true
        type: number
      pr_number:
        description: Implementation PR number
        required: true
        type: number
      decision:
        description: Human merge decision
        required: true
        type: choice
        options: ['approve-merge', 'request-changes', 'needs-clarification', 'reject']
      rationale:
        description: Human rationale
        required: true
        type: string
      reviewer:
        description: Reviewer source
        required: false
        type: string
        default: GitHub
  repository_dispatch:
    types: [stage11-merge-decision]

permissions:
  contents: write
  issues: write
  pull-requests: write
  checks: read

concurrency:
  group: stage11-merge-decision-${{ github.event.inputs.pr_number || github.event.client_payload.pr_number || github.run_id }}
  cancel-in-progress: false

jobs:
  decide:
    name: Process merge decision
    runs-on: ubuntu-latest
    steps:
      - name: Apply Stage 11 decision
        uses: actions/github-script@v9
        env:
          GH_PROJECT_PAT: ${{ secrets.GH_PROJECT_PAT }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_REVIEW_CHANNEL_ID: ${{ secrets.SLACK_REVIEW_CHANNEL_ID }}
          DUUMBI_METRICS_PATH: duumbi-workflow-metrics.json
        with:
          script: |
            const fs = require("fs");
            const raw = context.eventName === "repository_dispatch" ? context.payload.client_payload : context.payload.inputs;
            const issueNumber = Number(raw.issue_number || 0);
            const prNumber = Number(raw.pr_number || 0);
            const decision = String(raw.decision || "");
            const rationale = String(raw.rationale || "");
            const reviewer = String(raw.reviewer || context.actor || "GitHub");
            const valid = new Set(["approve-merge", "request-changes", "needs-clarification", "reject"]);
            if (!Number.isInteger(issueNumber) || issueNumber < 1) throw new Error(`Invalid issue_number: ${raw.issue_number}`);
            if (!Number.isInteger(prNumber) || prNumber < 1) throw new Error(`Invalid pr_number: ${raw.pr_number}`);
            if (!valid.has(decision)) throw new Error(`Unsupported Stage 11 decision: ${decision}`);

            const issueUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/issues/${issueNumber}`;
            const prUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/pull/${prNumber}`;
            const marker = `<!-- duumbi-stage11-merge-decision:v1 issue=${issueNumber} pr=${prNumber} decision=${decision} -->`;
            const now = new Date().toISOString();
            const warnings = [];

            const updateProjectStatus = async (status) => {
              const projectPat = process.env.GH_PROJECT_PAT;
              if (!projectPat || !status) return false;
              const gql = async (query, variables) => {
                const res = await fetch("https://api.github.com/graphql", {
                  method: "POST",
                  headers: { Authorization: `bearer ${projectPat}`, "Content-Type": "application/json" },
                  body: JSON.stringify({ query, variables }),
                });
                const json = await res.json();
                if (json.errors) throw new Error(json.errors.map((e) => e.message).join("; "));
                return json.data;
              };
              const itemsData = await gql(`
                query($owner: String!, $repo: String!, $number: Int!) {
                  repository(owner: $owner, name: $repo) {
                    issue(number: $number) {
                      projectItems(first: 10) { nodes { id project { id title } } }
                    }
                  }
                }`, { owner: context.repo.owner, repo: context.repo.repo, number: issueNumber });
              const items = itemsData.repository?.issue?.projectItems?.nodes || [];
              let updated = false;
              for (const item of items) {
                const fieldsData = await gql(`
                  query($pid: ID!) {
                    node(id: $pid) {
                      ... on ProjectV2 {
                        fields(first: 30) {
                          nodes {
                            ... on ProjectV2SingleSelectField { id name options { id name } }
                          }
                        }
                      }
                    }
                  }`, { pid: item.project.id });
                const statusField = fieldsData.node?.fields?.nodes?.find((field) => field.name === "Status");
                const option = statusField?.options?.find((opt) => opt.name === status);
                if (!statusField || !option) continue;
                await gql(`
                  mutation($pid: ID!, $iid: ID!, $fid: ID!, $oid: String!) {
                    updateProjectV2ItemFieldValue(input: {
                      projectId: $pid, itemId: $iid, fieldId: $fid,
                      value: { singleSelectOptionId: $oid }
                    }) { projectV2Item { id } }
                  }`, { pid: item.project.id, iid: item.id, fid: statusField.id, oid: option.id });
                updated = true;
              }
              return updated;
            };

            const issueComments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              per_page: 100,
            });
            const prComments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });
            const reviewArtifact = [...issueComments, ...prComments].find((comment) =>
              /## Stage 11 Review Artifact/i.test(comment.body || "") &&
              /Ready for Human Merge Decision/i.test(comment.body || "")
            );

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            const checkRuns = await github.paginate(github.rest.checks.listForRef, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: pr.head.sha,
              per_page: 100,
            });
            const badChecks = checkRuns.filter((check) =>
              check.status !== "completed" || !["success", "neutral", "skipped"].includes(check.conclusion)
            );
            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              per_page: 100,
            });
            const copilotReviews = reviews.filter((review) => /copilot/i.test(review.user?.login || ""));
            const copilotBlocking = copilotReviews.some((review) => ["CHANGES_REQUESTED"].includes(review.state));

            let mergeSha = "";
            let nextState = "In Review";
            if (decision === "approve-merge") {
              if (pr.state !== "open" || pr.draft) throw new Error("PR must be open and ready for review before merge.");
              if (!reviewArtifact) throw new Error("Stage 11 review artifact with Ready for Human Merge Decision is required before merge.");
              if (checkRuns.length === 0) throw new Error("No check runs found; failing closed because green CI cannot be verified.");
              if (badChecks.length > 0) throw new Error(`Checks are not green: ${badChecks.map((check) => `${check.name}:${check.status}/${check.conclusion}`).join(", ")}`);
              if (copilotReviews.length === 0) throw new Error("No Copilot review found; failing closed.");
              if (copilotBlocking) throw new Error("Copilot has unresolved blocking review feedback.");
              const merge = await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                merge_method: "squash",
                commit_title: pr.title,
              });
              mergeSha = merge.data.sha || "";
              nextState = "In Review";
            } else if (decision === "request-changes") {
              nextState = "In Progress";
            } else if (decision === "needs-clarification") {
              nextState = "Needs Clarification";
            } else if (decision === "reject") {
              if (pr.state === "open") {
                await github.rest.pulls.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  state: "closed",
                });
              }
              nextState = "Deferred";
            }

            let projectUpdated = false;
            try {
              projectUpdated = await updateProjectStatus(nextState);
            } catch (err) {
              warnings.push(`Project V2 update failed: ${err.message}`);
              core.warning(warnings[warnings.length - 1]);
            }

            const closurePrompt = decision === "approve-merge" ? [
              "Run DUUMBI Stage 12 Closure with duumbi-closure.",
              "",
              `Merged PR or completion evidence: ${prUrl}`,
              `Linked issue: ${issueUrl}`,
              mergeSha ? `Merge SHA: ${mergeSha}` : "",
              "",
              "Goal: Verify merge evidence, Stage 11 review artifact, approved product spec, approved technical spec, checks, and final human decision. Add closure evidence to the issue, set Project status to Done when available, close the issue when appropriate, update source surfaces when available, process related Inbox notes if any, and decide whether durable knowledge sync is needed.",
            ].filter(Boolean).join("\n") : "";

            const decisionBody = [
              marker,
              "## Stage 11 Merge Decision",
              "",
              `**Decision:** ${decision}`,
              `**Reviewer source:** ${reviewer}`,
              `**Rationale:** ${rationale}`,
              `**Issue:** ${issueUrl}`,
              `**PR:** ${prUrl}`,
              `**Stage 11 review artifact:** ${reviewArtifact?.html_url || "missing"}`,
              `**Check runs:** ${checkRuns.length} checked; ${badChecks.length} blocking`,
              `**Copilot reviews:** ${copilotReviews.length}; blocking=${copilotBlocking}`,
              `**Merge SHA:** ${mergeSha || "not merged"}`,
              `**PR disposition:** ${decision === "reject" ? "closed as abandoned" : "unchanged unless merged"}`,
              `**Next state:** ${decision === "approve-merge" ? "Stage 12 Closure" : nextState}`,
              closurePrompt ? ["", "## Next Codex Prompt", "", "```text", closurePrompt, "```"].join("\n") : "",
            ].filter(Boolean).join("\n");

            const { data: issueComment } = await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: decisionBody,
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: [
                marker,
                "## Stage 11 Merge Decision",
                "",
                `**Decision:** ${decision}`,
                `**Issue decision comment:** ${issueComment.html_url}`,
                `**Merge SHA:** ${mergeSha || "not merged"}`,
                `**PR disposition:** ${decision === "reject" ? "closed as abandoned" : "unchanged unless merged"}`,
              ].join("\n"),
            });

            const slackToken = process.env.SLACK_BOT_TOKEN;
            const slackChannel = process.env.SLACK_REVIEW_CHANNEL_ID;
            if (slackToken && slackChannel) {
              const text = [
                `Stage 11 *${decision}* — <${prUrl}|PR #${prNumber}>`,
                `Issue: <${issueUrl}|#${issueNumber}>`,
                `Decision comment: ${issueComment.html_url}`,
                mergeSha ? `Merged: ${mergeSha}` : null,
                closurePrompt ? ["", "Next Codex prompt:", "```", closurePrompt, "```"].join("\n") : null,
              ].filter(Boolean).join("\n");
              const res = await fetch("https://slack.com/api/chat.postMessage", {
                method: "POST",
                headers: { Authorization: `Bearer ${slackToken}`, "Content-Type": "application/json; charset=utf-8" },
                body: JSON.stringify({ channel: slackChannel, text }),
              });
              const body = await res.json();
              if (!res.ok || !body.ok) warnings.push(`Slack notification failed: ${body.error || res.status}`);
            }

            fs.writeFileSync(process.env.DUUMBI_METRICS_PATH, `${JSON.stringify({
              schema_version: "duumbi.workflow_metrics.v1",
              generated_at: now,
              source: "github_actions",
              repository: `${context.repo.owner}/${context.repo.repo}`,
              workflow: { name: context.workflow, file: ".github/workflows/stage11-merge-decision.yml", run_id: context.runId, run_attempt: Number(process.env.GITHUB_RUN_ATTEMPT || 1), event_name: context.eventName, actor: context.actor, ref: context.ref, sha: context.sha, conclusion: "success", started_at: now, completed_at: now, duration_ms: null },
              correlation: { issue_number: issueNumber, pr_number: prNumber, stage: "11", decision, project_status: projectUpdated ? nextState : null },
              counts: { issues_considered: 1, issues_queued: null, slack_notifications_attempted: slackToken && slackChannel ? 1 : 0, artifact_links_found: reviewArtifact ? 1 : 0, artifact_links_missing: reviewArtifact ? 0 : 1 },
              provider_usage: { available: false, reason: "decision_record_only", provider: null, model: null, request_count: null, prompt_tokens: null, completion_tokens: null, total_tokens: null, estimated_cost_usd: null, latency_ms: null, failure_count: null },
              privacy: { metadata_only: true, raw_prompts_included: false, raw_completions_included: false, raw_slack_payloads_included: false, secrets_included: false },
              warnings,
            }, null, 2)}\n`);
            await core.summary
              .addHeading("Stage 11 Merge Decision", 2)
              .addTable([
                [{ data: "Field", header: true }, { data: "Value", header: true }],
                ["Issue", `#${issueNumber}`],
                ["PR", `#${prNumber}`],
                ["Decision", decision],
                ["Decision comment", issueComment.html_url],
                ["Merge SHA", mergeSha || "not merged"],
                ["Project status updated", String(projectUpdated)],
              ])
              .write();

      - name: Upload DUUMBI workflow metrics
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: duumbi-workflow-metrics-stage11-merge-decision-${{ github.run_id }}-${{ github.run_attempt }}
          path: duumbi-workflow-metrics.json
          if-no-files-found: warn
