name: Human Acceptance Request

on:
  issues:
    types: [labeled]
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      issue_url:
        description: GitHub issue URL to request human acceptance for
        required: true
        type: string
      issue_number:
        description: GitHub issue number
        required: true
        type: number
      status:
        description: Human acceptance status
        required: false
        default: Needs Human Acceptance
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: human-acceptance-${{ github.event.issue.number || inputs.issue_number || github.event_name }}
  cancel-in-progress: false

jobs:
  notify:
    name: Notify Slack
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
    outputs:
      issue_numbers: ${{ steps.request.outputs.issue_numbers }}
      should_notify: ${{ steps.request.outputs.should_notify }}
      issues_queued_count: ${{ steps.request.outputs.issues_queued_count }}
    steps:
      - name: Validate request and build Slack payload
        id: request
        uses: actions/github-script@v9
        env:
          INPUT_ISSUE_URL: ${{ inputs.issue_url || '' }}
          INPUT_ISSUE_NUMBER: ${{ inputs.issue_number || '' }}
          INPUT_STATUS: ${{ inputs.status || '' }}
        with:
          script: |
            const marker = "<!-- duumbi-human-acceptance-slack-notified -->";
            const maxScheduledIssues = 10;
            const ozEnvironmentName = "duumbi-vault-knowledge-env";
            const ozEnvironmentId = "eKLEWjD4PNqFC6j0EcDEYA";
            const status = String(process.env.INPUT_STATUS || "Needs Human Acceptance").trim();
            const sanitizePromptField = (value) => String(value ?? "")
              .replace(/```/g, "'''")
              .replace(/`/g, "'")
              .replace(/[\r\n]+/g, " ")
              .trim();
            const sanitizeSlackField = (value) => sanitizePromptField(value)
              .replace(/&/g, "&amp;")
              .replace(/</g, "&lt;")
              .replace(/>/g, "&gt;")
              .replace(/@/g, "@\u200b");
            const labelsFor = (issue) => issue.labels
              .map((label) => typeof label === "string" ? label : label.name)
              .filter(Boolean);
            const issueUrlFor = (number) => `https://github.com/${context.repo.owner}/${context.repo.repo}/issues/${number}`;

            const hasNotificationMarker = async (issueNumber) => {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                per_page: 100,
              });
              return comments.some((comment) => comment.body?.includes(marker));
            };

            const fetchIssue = async (issueNumber) => {
              const { data: issue } = await github.rest.issues.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
              });
              return issue;
            };

            const validateIssueUrl = (issueUrl, issueNumber) => {
              const issueMatch = issueUrl.match(/^https:\/\/github\.com\/([^/]+)\/([^/]+)\/issues\/(\d+)$/);
              if (!issueMatch) {
                throw new Error(`Invalid issue_url: ${issueUrl}`);
              }
              if (issueMatch[1] !== context.repo.owner || issueMatch[2] !== context.repo.repo) {
                throw new Error(`Issue URL must belong to ${context.repo.owner}/${context.repo.repo}: ${issueUrl}`);
              }
              if (Number.parseInt(issueMatch[3], 10) !== issueNumber) {
                throw new Error(`issue_url and issue_number do not match: ${issueUrl} vs ${issueNumber}`);
              }
            };

            const workflowDispatchUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/workflows/stage-approval.yml`;

            const buildSlackMessage = (issue, triggeredBy) => {
              const issueUrl = issue.html_url || issueUrlFor(issue.number);
              const labelNames = labelsFor(issue);
              const labels = labelNames.join(", ") || "none";
              const title = sanitizeSlackField(issue.title);
              const safeLabels = sanitizeSlackField(labels);
              const safeTriggeredBy = sanitizeSlackField(triggeredBy);
              const correlationId = `${context.runId}-${issue.number}`;

              const buttonValue = (decision) => JSON.stringify({
                stage: "5",
                issue_number: issue.number,
                decision,
              });

              return {
                text: `DUUMBI issue #${issue.number} needs human acceptance: ${title}`,
                blocks: [
                  {
                    type: "section",
                    text: {
                      type: "mrkdwn",
                      text: `*DUUMBI issue needs human acceptance*\n*Issue:* <${issueUrl}|#${issue.number} ${title}>\n*Trigger:* \`needs-human-review\` label\n*Status:* Needs Human Acceptance\n*Labels:* ${safeLabels}\n*Triggered by:* ${safeTriggeredBy}\n*Correlation:* \`${correlationId}\``,
                    },
                  },
                  {
                    type: "actions",
                    block_id: `human_acceptance_${issue.number}`,
                    elements: [
                      {
                        type: "button",
                        text: { type: "plain_text", text: "✅ Accept", emoji: true },
                        style: "primary",
                        action_id: "stage_approve",
                        value: buttonValue("approve"),
                        confirm: {
                          title: { type: "plain_text", text: "Accept Issue" },
                          text: { type: "mrkdwn", text: `Accept issue #${issue.number} for specification?\nThis will set the issue to *Spec Needed*.` },
                          confirm: { type: "plain_text", text: "Accept" },
                          deny: { type: "plain_text", text: "Cancel" },
                        },
                      },
                      {
                        type: "button",
                        text: { type: "plain_text", text: "❓ Needs Clarification", emoji: true },
                        action_id: "stage_needs_clarification",
                        value: buttonValue("needs-clarification"),
                      },
                      {
                        type: "button",
                        text: { type: "plain_text", text: "🚫 Reject", emoji: true },
                        style: "danger",
                        action_id: "stage_reject",
                        value: buttonValue("reject"),
                        confirm: {
                          title: { type: "plain_text", text: "Reject Issue" },
                          text: { type: "mrkdwn", text: `Reject issue #${issue.number}? This will close the issue.` },
                          confirm: { type: "plain_text", text: "Reject" },
                          deny: { type: "plain_text", text: "Cancel" },
                        },
                      },
                    ],
                  },
                  {
                    type: "context",
                    elements: [
                      {
                        type: "mrkdwn",
                        text: `Buttons are handled by the Slack approval bridge. Fallback: run <${workflowDispatchUrl}|Stage Approval> workflow manually (stage=5, issue=${issue.number}).`,
                      },
                    ],
                  },
                ],
              };
            };

            let issuesToNotify = [];
            let triggeredBy = context.actor || "unknown";

            if (context.eventName === "schedule") {
              const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: "open",
                labels: "needs-human-review",
                per_page: 100,
              });

              for (const issue of openIssues) {
                if (issue.pull_request) {
                  continue;
                }
                const labelNames = labelsFor(issue);
                if (labelNames.includes("accepted") || labelNames.includes("needs-spec")) {
                  continue;
                }
                if (await hasNotificationMarker(issue.number)) {
                  continue;
                }
                issuesToNotify.push(issue);
                if (issuesToNotify.length >= maxScheduledIssues) {
                  core.info(`Scheduled sweep capped at ${maxScheduledIssues} issues for this run.`);
                  break;
                }
              }
              triggeredBy = "scheduled sweep";
            } else {
              const payload = context.eventName === "workflow_dispatch"
                ? {
                    issue_url: process.env.INPUT_ISSUE_URL,
                    issue_number: Number(process.env.INPUT_ISSUE_NUMBER || 0),
                    status,
                    triggered_by: context.actor,
                  }
                : {
                    issue_url: context.payload.issue?.html_url,
                    issue_number: Number(context.payload.issue?.number || 0),
                    status: "Needs Human Acceptance",
                    triggered_by: context.payload.sender?.login || context.actor,
                    label: context.payload.label?.name,
                  };

              if (context.eventName === "issues" && payload.label !== "needs-human-review") {
                core.info(`Ignoring label "${payload.label}".`);
                core.setOutput("should_notify", "false");
                return;
              }

              if (payload.status !== "Needs Human Acceptance") {
                core.info(`Ignoring request because status is "${payload.status}".`);
                core.setOutput("should_notify", "false");
                return;
              }

              const issueNumber = payload.issue_number;
              const issueUrl = String(payload.issue_url || "").trim();
              if (!Number.isInteger(issueNumber) || issueNumber < 1) {
                core.setFailed(`Invalid issue_number: ${payload.issue_number}`);
                return;
              }
              try {
                validateIssueUrl(issueUrl, issueNumber);
              } catch (error) {
                core.setFailed(error.message);
                return;
              }

              issuesToNotify.push(await fetchIssue(issueNumber));
              triggeredBy = String(payload.triggered_by || context.actor || "unknown");
            }

            if (issuesToNotify.length === 0) {
              core.info("No unnotified issues need human acceptance.");
              core.setOutput("issue_numbers", "[]");
              core.setOutput("issues_queued_count", "0");
              core.setOutput("should_notify", "false");
              return;
            }

            const slackMessages = issuesToNotify.map((issue) => buildSlackMessage(issue, triggeredBy));
            core.setOutput("slack_messages", JSON.stringify(slackMessages));
            core.setOutput("issue_numbers", JSON.stringify(issuesToNotify.map((issue) => issue.number)));
            core.setOutput("issues_queued_count", String(issuesToNotify.length));
            core.setOutput("should_notify", "true");

      - name: Post Slack notifications
        if: success() && steps.request.outputs.should_notify == 'true'
        uses: actions/github-script@v9
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_REVIEW_CHANNEL_ID: ${{ secrets.SLACK_REVIEW_CHANNEL_ID }}
          SLACK_MESSAGES: ${{ steps.request.outputs.slack_messages }}
        with:
          script: |
            const token = process.env.SLACK_BOT_TOKEN;
            const channel = process.env.SLACK_REVIEW_CHANNEL_ID;
            const messages = JSON.parse(process.env.SLACK_MESSAGES || "[]");

            if (!token) {
              core.setFailed("SLACK_BOT_TOKEN is not configured.");
              return;
            }
            if (!channel) {
              core.setFailed("SLACK_REVIEW_CHANNEL_ID is not configured.");
              return;
            }

            for (const message of messages) {
              const response = await fetch("https://slack.com/api/chat.postMessage", {
                method: "POST",
                headers: {
                  Authorization: `Bearer ${token}`,
                  "Content-Type": "application/json; charset=utf-8",
                },
                body: JSON.stringify({
                  channel,
                  ...message,
                }),
              });
              const body = await response.json();
              if (!response.ok || !body.ok) {
                core.setFailed(`Slack chat.postMessage failed: ${body.error || response.status}`);
                return;
              }
              core.info(`Posted Slack notification ts=${body.ts}`);
            }

  mark-notified:
    name: Mark notified issues
    needs: notify
    if: success() && needs.notify.outputs.should_notify == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Mark notified issues
        uses: actions/github-script@v9
        env:
          ISSUE_NUMBERS: ${{ needs.notify.outputs.issue_numbers }}
          MARKER: <!-- duumbi-human-acceptance-slack-notified -->
        with:
          script: |
            const issueNumbers = JSON.parse(process.env.ISSUE_NUMBERS || "[]");
            const marker = process.env.MARKER;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            for (const issueNumber of issueNumbers) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: [
                  marker,
                  "Human acceptance Slack notification requested through Oz.",
                  "",
                  `Workflow run: ${runUrl}`,
                  `Source event: ${context.eventName}`,
                ].join("\n"),
              });
            }

  metrics:
    name: Write workflow metrics
    needs: [notify, mark-notified]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Write DUUMBI workflow metrics
        if: always()
        continue-on-error: true
        uses: actions/github-script@v9
        env:
          NOTIFY_RESULT: ${{ needs.notify.result }}
          MARK_NOTIFIED_RESULT: ${{ needs.mark-notified.result }}
          ISSUE_NUMBERS: ${{ needs.notify.outputs.issue_numbers || '[]' }}
          SHOULD_NOTIFY: ${{ needs.notify.outputs.should_notify || 'false' }}
          ISSUES_QUEUED_COUNT: ${{ needs.notify.outputs.issues_queued_count || '0' }}
          DUUMBI_METRICS_PATH: duumbi-workflow-metrics.json
        with:
          script: |
            const fs = require("fs");
            const path = process.env.DUUMBI_METRICS_PATH || "duumbi-workflow-metrics.json";
            const { owner, repo } = context.repo;
            const now = new Date().toISOString();
            const durationMs = (start, end) => {
              if (!start || !end) return null;
              const ms = new Date(end).getTime() - new Date(start).getTime();
              return Number.isFinite(ms) && ms >= 0 ? ms : null;
            };
            const asNumber = (value) => {
              const n = Number(value);
              return Number.isFinite(n) ? n : null;
            };
            const safeJsonArray = (value) => {
              try {
                const parsed = JSON.parse(value || "[]");
                return Array.isArray(parsed) ? parsed : [];
              } catch {
                return [];
              }
            };

            let jobs = [];
            let warning = null;
            try {
              jobs = await github.paginate(github.rest.actions.listJobsForWorkflowRun, {
                owner, repo, run_id: context.runId, per_page: 100,
              });
            } catch (err) {
              warning = `job metadata unavailable: ${String(err.message || err).slice(0, 160)}`;
              core.warning(warning);
            }

            const phases = jobs.map((job) => ({
              name: job.name,
              conclusion: job.conclusion || job.status || "unknown",
              started_at: job.started_at || null,
              completed_at: job.completed_at || null,
              duration_ms: durationMs(job.started_at, job.completed_at),
              warning_count: null,
              failure_count: job.conclusion === "failure" ? 1 : 0,
            }));
            const starts = phases.map((p) => p.started_at).filter(Boolean).sort();
            const ends = phases.map((p) => p.completed_at).filter(Boolean).sort();
            const hasInProgressJob = phases.some((p) => p.started_at && !p.completed_at);
            const startedAt = starts[0] || null;
            const completedAt = hasInProgressJob ? now : (ends[ends.length - 1] || now);
            const failed = [process.env.NOTIFY_RESULT, process.env.MARK_NOTIFIED_RESULT].includes("failure");
            const cancelled = [process.env.NOTIFY_RESULT, process.env.MARK_NOTIFIED_RESULT].includes("cancelled");
            const workflowConclusion = failed ? "failure" : (cancelled ? "cancelled" : "success");
            const issueNumbers = safeJsonArray(process.env.ISSUE_NUMBERS);
            const issueNumber = issueNumbers.length === 1 ? Number(issueNumbers[0]) : null;

            const metrics = {
              schema_version: "duumbi.workflow_metrics.v1",
              generated_at: now,
              source: "github_actions",
              repository: `${owner}/${repo}`,
              workflow: {
                name: context.workflow,
                file: ".github/workflows/human-acceptance-request.yml",
                run_id: context.runId,
                run_attempt: Number(process.env.GITHUB_RUN_ATTEMPT || 1),
                event_name: context.eventName,
                actor: context.actor,
                ref: context.ref,
                sha: context.sha,
                conclusion: workflowConclusion,
                started_at: startedAt,
                completed_at: completedAt,
                duration_ms: durationMs(startedAt, completedAt),
              },
              correlation: {
                issue_number: Number.isFinite(issueNumber) ? issueNumber : null,
                pr_number: null,
                stage: "5",
                decision: null,
                project_status: "Needs Human Acceptance",
              },
              phases,
              counts: {
                issues_considered: null,
                issues_queued: asNumber(process.env.ISSUES_QUEUED_COUNT),
                slack_notifications_attempted: process.env.SHOULD_NOTIFY === "true" ? issueNumbers.length : 0,
                artifact_links_found: null,
                artifact_links_missing: null,
              },
              provider_usage: {
                available: false,
                reason: "no_provider_step",
                provider: null,
                model: null,
                request_count: null,
                prompt_tokens: null,
                completion_tokens: null,
                total_tokens: null,
                estimated_cost_usd: null,
                latency_ms: null,
                failure_count: null,
              },
              privacy: {
                metadata_only: true,
                raw_prompts_included: false,
                raw_completions_included: false,
                raw_slack_payloads_included: false,
                secrets_included: false,
              },
              warnings: warning ? [warning] : [],
            };

            fs.writeFileSync(path, `${JSON.stringify(metrics, null, 2)}\n`);
            await core.summary
              .addHeading("DUUMBI Workflow Metrics", 2)
              .addTable([
                [{ data: "Field", header: true }, { data: "Value", header: true }],
                ["Artifact", `duumbi-workflow-metrics-human-acceptance-${context.runId}-${process.env.GITHUB_RUN_ATTEMPT || 1}`],
                ["Workflow conclusion", workflowConclusion],
                ["Duration ms", String(metrics.workflow.duration_ms ?? "unavailable")],
                ["Issues queued", String(metrics.counts.issues_queued ?? "unavailable")],
                ["Slack notifications attempted", String(metrics.counts.slack_notifications_attempted ?? "unavailable")],
                ["Provider usage", "unavailable: no_provider_step"],
              ])
              .write();

      - name: Upload DUUMBI workflow metrics
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: duumbi-workflow-metrics-human-acceptance-${{ github.run_id }}-${{ github.run_attempt }}
          path: duumbi-workflow-metrics.json
          if-no-files-found: warn
