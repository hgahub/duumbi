name: Human Acceptance Request

on:
  repository_dispatch:
    types: [duumbi-human-acceptance-needed]
  workflow_dispatch:
    inputs:
      issue_url:
        description: GitHub issue URL to request human acceptance for
        required: true
        type: string
      issue_number:
        description: GitHub issue number
        required: true
        type: string
      status:
        description: Project status that triggered the request
        required: false
        default: Needs Human Acceptance
        type: string
      project_item_id:
        description: Optional GitHub Projects v2 item id
        required: false
        type: string
      project_url:
        description: Optional GitHub Projects v2 URL
        required: false
        type: string
      triggered_by:
        description: Optional actor that triggered the request
        required: false
        type: string
      correlation_id:
        description: Optional bridge correlation id
        required: false
        type: string

permissions:
  contents: read
  issues: read

concurrency:
  group: human-acceptance-${{ github.event.client_payload.issue_number || inputs.issue_number || github.run_id }}
  cancel-in-progress: false

jobs:
  notify:
    name: Notify Slack
    runs-on: ubuntu-latest
    steps:
      - name: Validate request and build Slack payload
        id: request
        uses: actions/github-script@v9
        env:
          DISPATCH_PAYLOAD: ${{ toJSON(github.event.client_payload) }}
          INPUT_ISSUE_URL: ${{ inputs.issue_url || '' }}
          INPUT_ISSUE_NUMBER: ${{ inputs.issue_number || '' }}
          INPUT_STATUS: ${{ inputs.status || '' }}
          INPUT_PROJECT_ITEM_ID: ${{ inputs.project_item_id || '' }}
          INPUT_PROJECT_URL: ${{ inputs.project_url || '' }}
          INPUT_TRIGGERED_BY: ${{ inputs.triggered_by || '' }}
          INPUT_CORRELATION_ID: ${{ inputs.correlation_id || '' }}
        with:
          script: |
            const fs = require("fs");

            const dispatchPayload = JSON.parse(process.env.DISPATCH_PAYLOAD || "{}");
            const payload = context.eventName === "workflow_dispatch"
              ? {
                  issue_url: process.env.INPUT_ISSUE_URL,
                  issue_number: process.env.INPUT_ISSUE_NUMBER,
                  status: process.env.INPUT_STATUS || "Needs Human Acceptance",
                  project_item_id: process.env.INPUT_PROJECT_ITEM_ID,
                  project_url: process.env.INPUT_PROJECT_URL,
                  triggered_by: process.env.INPUT_TRIGGERED_BY,
                  correlation_id: process.env.INPUT_CORRELATION_ID,
                }
              : dispatchPayload;

            const status = String(payload.status || "").trim();
            if (status !== "Needs Human Acceptance") {
              core.info(`Ignoring request because status is "${status}".`);
              core.setOutput("should_notify", "false");
              return;
            }

            const issueNumber = Number.parseInt(String(payload.issue_number || ""), 10);
            const issueUrl = String(payload.issue_url || "").trim();
            if (!Number.isInteger(issueNumber) || issueNumber < 1) {
              core.setFailed(`Invalid issue_number: ${payload.issue_number}`);
              return;
            }
            const issueMatch = issueUrl.match(/^https:\/\/github\.com\/([^/]+)\/([^/]+)\/issues\/(\d+)$/);
            if (!issueMatch) {
              core.setFailed(`Invalid issue_url: ${issueUrl}`);
              return;
            }
            if (issueMatch[1] !== context.repo.owner || issueMatch[2] !== context.repo.repo) {
              core.setFailed(`Issue URL must belong to ${context.repo.owner}/${context.repo.repo}: ${issueUrl}`);
              return;
            }
            if (Number.parseInt(issueMatch[3], 10) !== issueNumber) {
              core.setFailed(`issue_url and issue_number do not match: ${issueUrl} vs ${issueNumber}`);
              return;
            }

            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
            });

            const labels = issue.labels
              .map((label) => typeof label === "string" ? label : label.name)
              .filter(Boolean)
              .join(", ") || "none";
            const triggeredBy = String(payload.triggered_by || context.actor || "unknown");
            const projectLine = payload.project_url
              ? `*Project:* ${payload.project_url}`
              : payload.project_item_id
                ? `*Project item:* ${payload.project_item_id}`
                : "*Project:* not provided";
            const correlationId = String(payload.correlation_id || `${context.runId}-${issueNumber}`);

            const ozPrompt = [
              "Run DUUMBI Stage 5 Human Acceptance with duumbi-human-acceptance.",
              "",
              `Target issue: ${issueUrl}`,
              "Human decision: Accept",
              "Reviewer source: Slack",
              "Rationale: <short human rationale>",
              "",
              "Goal: Record the structured Stage 5 decision, set the issue to Spec Needed, add accepted and needs-spec labels, and remove needs-human-review when available.",
              "",
              "Do not create product specs, technical specs, PRs, source-code changes, or implementation branches.",
            ].join("\n");

            const slackPayload = {
              text: `DUUMBI issue #${issueNumber} needs human acceptance: ${issue.title}`,
              blocks: [
                {
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text: `*DUUMBI issue needs human acceptance*\n*Issue:* <${issueUrl}|#${issueNumber} ${issue.title}>\n*Status:* ${status}\n*Labels:* ${labels}\n${projectLine}\n*Triggered by:* ${triggeredBy}`,
                  },
                },
                {
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text: "*Reply in this thread with @Oz accepted: <short rationale>*",
                  },
                },
                {
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text: `When accepting, Oz must run in \`duumbi-vault-knowledge-env\` with this prompt:\n\`\`\`${ozPrompt}\`\`\``,
                  },
                },
                {
                  type: "context",
                  elements: [
                    {
                      type: "mrkdwn",
                      text: `Correlation: \`${correlationId}\``,
                    },
                  ],
                },
              ],
            };

            fs.writeFileSync("slack-payload.json", `${JSON.stringify(slackPayload)}\n`, "utf8");
            core.setOutput("should_notify", "true");

      - name: Post Slack notification
        if: steps.request.outputs.should_notify == 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [[ -z "$SLACK_WEBHOOK_URL" ]]; then
            echo "SLACK_WEBHOOK_URL is not configured." >&2
            exit 1
          fi

          curl --fail --show-error --silent \
            --request POST \
            --header 'Content-type: application/json' \
            --data @slack-payload.json \
            "$SLACK_WEBHOOK_URL"
