name: Stage 10 Authorization Request

on:
  issues:
    types: [labeled]
  schedule:
    - cron: '20 * * * *'
  workflow_dispatch:
    inputs:
      issue_number:
        description: GitHub issue number requiring resource authorization
        required: true
        type: number
  repository_dispatch:
    types: [stage10-authorization]

permissions:
  contents: read
  issues: write

concurrency:
  group: stage10-authorization-${{ github.event.issue.number || inputs.issue_number || github.event.client_payload.issue_number || github.run_id }}
  cancel-in-progress: false

jobs:
  process:
    name: Notify or process Stage 10 authorization
    runs-on: ubuntu-latest
    steps:
      - name: Process Stage 10 authorization path
        uses: actions/github-script@v9
        env:
          GH_PROJECT_PAT: ${{ secrets.GH_PROJECT_PAT }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_REVIEW_CHANNEL_ID: ${{ secrets.SLACK_REVIEW_CHANNEL_ID }}
          DUUMBI_METRICS_PATH: duumbi-workflow-metrics.json
        with:
          script: |
            const fs = require("fs");
            const markerPrefix = "<!-- duumbi-stage10-authorization-slack-notified:v1";
            const decisionMarkerPrefix = "<!-- duumbi-stage10-authorization-decision:v1";
            const now = new Date().toISOString();
            const labelsFor = (issue) => (issue.labels || []).map((label) => typeof label === "string" ? label : label.name).filter(Boolean);
            const issueUrlFor = (number) => `https://github.com/${context.repo.owner}/${context.repo.repo}/issues/${number}`;

            const updateProjectStatus = async (issueNumber, status) => {
              const projectPat = process.env.GH_PROJECT_PAT;
              if (!projectPat || !status) return false;
              const gql = async (query, variables) => {
                const res = await fetch("https://api.github.com/graphql", {
                  method: "POST",
                  headers: { Authorization: `bearer ${projectPat}`, "Content-Type": "application/json" },
                  body: JSON.stringify({ query, variables }),
                });
                const json = await res.json();
                if (json.errors) throw new Error(json.errors.map((e) => e.message).join("; "));
                return json.data;
              };
              const itemsData = await gql(`
                query($owner: String!, $repo: String!, $number: Int!) {
                  repository(owner: $owner, name: $repo) {
                    issue(number: $number) {
                      projectItems(first: 10) { nodes { id project { id title } } }
                    }
                  }
                }`, { owner: context.repo.owner, repo: context.repo.repo, number: issueNumber });
              const items = itemsData.repository?.issue?.projectItems?.nodes || [];
              let updated = false;
              for (const item of items) {
                const fieldsData = await gql(`
                  query($pid: ID!) {
                    node(id: $pid) {
                      ... on ProjectV2 {
                        fields(first: 30) {
                          nodes {
                            ... on ProjectV2SingleSelectField { id name options { id name } }
                          }
                        }
                      }
                    }
                  }`, { pid: item.project.id });
                const statusField = fieldsData.node?.fields?.nodes?.find((field) => field.name === "Status");
                const option = statusField?.options?.find((opt) => opt.name === status);
                if (!statusField || !option) continue;
                await gql(`
                  mutation($pid: ID!, $iid: ID!, $fid: ID!, $oid: String!) {
                    updateProjectV2ItemFieldValue(input: {
                      projectId: $pid, itemId: $iid, fieldId: $fid,
                      value: { singleSelectOptionId: $oid }
                    }) { projectV2Item { id } }
                  }`, { pid: item.project.id, iid: item.id, fid: statusField.id, oid: option.id });
                updated = true;
              }
              return updated;
            };

            if (context.eventName === "repository_dispatch") {
              const raw = context.payload.client_payload || {};
              const issueNumber = Number(raw.issue_number || 0);
              const decision = String(raw.decision || "");
              const reviewer = raw.reviewer || context.actor;
              const rationale = raw.rationale || `Stage 10 ${decision} recorded by ${reviewer}.`;
              if (!Number.isInteger(issueNumber) || issueNumber < 1) throw new Error(`Invalid issue_number: ${raw.issue_number}`);
              if (!["approve", "needs-clarification", "block"].includes(decision)) throw new Error(`Unsupported Stage 10 decision: ${decision}`);
              const nextState = decision === "approve" ? "In Progress" : decision === "needs-clarification" ? "Needs Clarification" : "Blocked";
              const marker = `${decisionMarkerPrefix} issue=${issueNumber} decision=${decision} -->`;
              const prompt = decision === "approve"
                ? [
                    "Run DUUMBI Stage 10 Ralph Cycle with duumbi-ralph-cycle.",
                    "",
                    `Target issue: ${issueUrlFor(issueNumber)}`,
                    "Mode: execute the exact approved resource-gated cycle only.",
                    "",
                    "Do not broaden scope, skip checks, merge, close, or continue beyond the approved cycle boundary.",
                  ].join("\n")
                : "";
              const body = [
                marker,
                "## Stage 10 Resource Authorization Decision",
                "",
                `**Decision:** ${decision}`,
                `**Reviewer source:** ${reviewer}`,
                `**Rationale:** ${rationale}`,
                `**Next state:** ${nextState}`,
                prompt ? ["", "## Next Codex Prompt", "", "```text", prompt, "```"].join("\n") : "",
              ].filter(Boolean).join("\n");
              const { data: comment } = await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body,
              });
              let projectUpdated = false;
              try {
                projectUpdated = await updateProjectStatus(issueNumber, nextState);
              } catch (err) {
                core.warning(`Project V2 update failed: ${err.message}`);
              }

              fs.writeFileSync(process.env.DUUMBI_METRICS_PATH, `${JSON.stringify({
                schema_version: "duumbi.workflow_metrics.v1",
                generated_at: now,
                source: "github_actions",
                repository: `${context.repo.owner}/${context.repo.repo}`,
                workflow: { name: context.workflow, file: ".github/workflows/stage10-authorization-request.yml", run_id: context.runId, run_attempt: Number(process.env.GITHUB_RUN_ATTEMPT || 1), event_name: context.eventName, actor: context.actor, ref: context.ref, sha: context.sha, conclusion: "success", started_at: now, completed_at: now, duration_ms: null },
                correlation: { issue_number: issueNumber, pr_number: null, stage: "10", decision, project_status: projectUpdated ? nextState : null },
                counts: { issues_considered: 1, issues_queued: null, slack_notifications_attempted: 0, artifact_links_found: 1, artifact_links_missing: 0 },
                provider_usage: { available: false, reason: "decision_record_only", provider: null, model: null, request_count: null, prompt_tokens: null, completion_tokens: null, total_tokens: null, estimated_cost_usd: null, latency_ms: null, failure_count: null },
                privacy: { metadata_only: true, raw_prompts_included: false, raw_completions_included: false, raw_slack_payloads_included: false, secrets_included: false },
                warnings: [],
              }, null, 2)}\n`);
              await core.summary.addHeading("Stage 10 Authorization Decision", 2).addRaw(`Decision comment: ${comment.html_url}\n`).write();
              return;
            }

            let issues = [];
            if (context.eventName === "issues") {
              const label = context.payload.label?.name;
              if (label !== "needs-cycle-approval") {
                core.info(`Ignoring label ${label}.`);
                return;
              }
              issues = [context.payload.issue];
            } else if (context.eventName === "workflow_dispatch") {
              const issueNumber = Number(context.payload.inputs.issue_number);
              const { data: issue } = await github.rest.issues.get({ owner: context.repo.owner, repo: context.repo.repo, issue_number: issueNumber });
              issues = [issue];
            } else {
              const listed = await github.paginate(github.rest.issues.listForRepo, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: "open",
                labels: "needs-cycle-approval",
                per_page: 100,
              });
              issues = listed.filter((issue) => !issue.pull_request).slice(0, 10);
            }

            const token = process.env.SLACK_BOT_TOKEN;
            const channel = process.env.SLACK_REVIEW_CHANNEL_ID;
            let notified = 0;
            for (const issue of issues) {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                per_page: 100,
              });
              const request = [...comments].reverse().find((comment) => /## Ralph Cycle \d+ Resource Approval Request/i.test(comment.body || ""));
              if (!request) {
                core.warning(`Issue #${issue.number} has no Ralph Cycle Resource Approval Request comment.`);
                continue;
              }
              const cycleMatch = (request.body || "").match(/## Ralph Cycle (\d+) Resource Approval Request/i);
              const cycle = cycleMatch ? Number(cycleMatch[1]) : 0;
              const marker = `${markerPrefix} issue=${issue.number} cycle=${cycle || "unknown"} request=${request.id}`;
              if (comments.some((comment) => (comment.body || "").includes(marker))) continue;
              const value = (decision) => JSON.stringify({ stage: "10", issue_number: issue.number, decision, cycle });
              const message = {
                text: `DUUMBI issue #${issue.number} needs Stage 10 resource authorization`,
                blocks: [
                  { type: "section", text: { type: "mrkdwn", text: `*DUUMBI Stage 10 resource authorization needed*\n*Issue:* <${issue.html_url}|#${issue.number} ${issue.title}>\n*Request:* <${request.html_url}|Ralph Cycle ${cycle || "?"} Resource Approval Request>\n*Labels:* ${labelsFor(issue).join(", ") || "none"}` } },
                  { type: "actions", block_id: `stage10_authorization_${issue.number}`, elements: [
                    { type: "button", text: { type: "plain_text", text: "Approve Cycle" }, style: "primary", action_id: "stage10_approve", value: value("approve") },
                    { type: "button", text: { type: "plain_text", text: "Needs Clarification" }, action_id: "stage10_needs_clarification", value: value("needs-clarification") },
                    { type: "button", text: { type: "plain_text", text: "Block" }, style: "danger", action_id: "stage10_block", value: value("block") },
                  ] },
                ],
              };
              if (!token || !channel) {
                core.warning("Slack token/channel missing; cannot post Stage 10 authorization notification.");
                continue;
              }
              const res = await fetch("https://slack.com/api/chat.postMessage", {
                method: "POST",
                headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json; charset=utf-8" },
                body: JSON.stringify({ channel, ...message }),
              });
              const body = await res.json();
              if (!res.ok || !body.ok) {
                core.warning(`Slack notification failed for #${issue.number}: ${body.error || res.status}`);
                continue;
              }
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: [
                  `${marker} -->`,
                  "Stage 10 resource authorization Slack notification requested.",
                  "",
                  `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                  `Request comment: ${request.html_url}`,
                ].join("\n"),
              });
              notified += 1;
            }

            fs.writeFileSync(process.env.DUUMBI_METRICS_PATH, `${JSON.stringify({
              schema_version: "duumbi.workflow_metrics.v1",
              generated_at: now,
              source: "github_actions",
              repository: `${context.repo.owner}/${context.repo.repo}`,
              workflow: { name: context.workflow, file: ".github/workflows/stage10-authorization-request.yml", run_id: context.runId, run_attempt: Number(process.env.GITHUB_RUN_ATTEMPT || 1), event_name: context.eventName, actor: context.actor, ref: context.ref, sha: context.sha, conclusion: "success", started_at: now, completed_at: now, duration_ms: null },
              correlation: { issue_number: issues.length === 1 ? issues[0].number : null, pr_number: null, stage: "10", decision: null, project_status: "Cycle Authorization" },
              counts: { issues_considered: issues.length, issues_queued: notified, slack_notifications_attempted: notified, artifact_links_found: null, artifact_links_missing: null },
              provider_usage: { available: false, reason: "notification_only", provider: null, model: null, request_count: null, prompt_tokens: null, completion_tokens: null, total_tokens: null, estimated_cost_usd: null, latency_ms: null, failure_count: null },
              privacy: { metadata_only: true, raw_prompts_included: false, raw_completions_included: false, raw_slack_payloads_included: false, secrets_included: false },
              warnings: [],
            }, null, 2)}\n`);
            await core.summary.addHeading("Stage 10 Authorization Notifications", 2).addRaw(`Notifications posted: ${notified}\n`).write();

      - name: Upload DUUMBI workflow metrics
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: duumbi-workflow-metrics-stage10-authorization-${{ github.run_id }}-${{ github.run_attempt }}
          path: duumbi-workflow-metrics.json
          if-no-files-found: warn
