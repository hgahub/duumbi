name: Slack Intake Dispatch

on:
  repository_dispatch:
    types: [slack-intake]
  workflow_dispatch:
    inputs:
      source_summary:
        description: Short Slack source summary
        required: true
        type: string
      source_text:
        description: Source idea text or excerpt
        required: false
        type: string
        default: ''

permissions:
  contents: read

concurrency:
  group: slack-intake-dispatch-${{ github.event.client_payload.channel_id || github.event.inputs.source_summary || github.run_id }}
  cancel-in-progress: false

jobs:
  dispatch:
    name: Dispatch Slack intake prompt
    runs-on: ubuntu-latest
    steps:
      - name: Build Slack intake handoff
        uses: actions/github-script@v9
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_REVIEW_CHANNEL_ID: ${{ secrets.SLACK_REVIEW_CHANNEL_ID }}
          DUUMBI_AGENT_DISPATCH_CHANNEL_ID: ${{ secrets.DUUMBI_AGENT_DISPATCH_CHANNEL_ID }}
          DUUMBI_METRICS_PATH: duumbi-workflow-metrics.json
        with:
          script: |
            const fs = require("fs");
            const raw = context.eventName === "repository_dispatch"
              ? context.payload.client_payload
              : {
                  source_summary: context.payload.inputs.source_summary,
                  text: context.payload.inputs.source_text,
                };
            const sourceSummary = raw.source_summary || [
              raw.channel_id ? `channel=${raw.channel_id}` : null,
              raw.message_ts ? `message_ts=${raw.message_ts}` : null,
              raw.thread_ts ? `thread_ts=${raw.thread_ts}` : null,
            ].filter(Boolean).join(" ") || "Slack shortcut";
            const sourceText = String(raw.text || "").slice(0, 3000);
            const prompt = [
              "Run DUUMBI Stage 1 Slack intake with duumbi-obsidian-capture.",
              "",
              `Source: ${sourceSummary}`,
              raw.user_name ? `Submitted by: ${raw.user_name}` : "",
              "",
              "Slack input:",
              sourceText || "<no text provided; inspect the Slack source if available>",
              "",
              "Goal: Capture the raw input into the DUUMBI Inbox, classify it, inspect active DUUMBI context, detect duplicates across active Inbox, Processed Inbox, Atlas, GitHub Issues, and GitHub Discussions, and report the next processing step.",
              "",
              "Do not create GitHub issues, specs, PRs, source changes, or implementation work.",
            ].filter(Boolean).join("\n");

            const token = process.env.SLACK_BOT_TOKEN;
            const channel = process.env.DUUMBI_AGENT_DISPATCH_CHANNEL_ID || process.env.SLACK_REVIEW_CHANNEL_ID;
            let slackNotification = "not_configured";
            if (token && channel) {
              const res = await fetch("https://slack.com/api/chat.postMessage", {
                method: "POST",
                headers: {
                  Authorization: `Bearer ${token}`,
                  "Content-Type": "application/json; charset=utf-8",
                },
                body: JSON.stringify({
                  channel,
                  text: ["*DUUMBI Slack Intake Dispatch*", "```", prompt, "```"].join("\n"),
                }),
              });
              const body = await res.json();
              slackNotification = res.ok && body.ok ? "posted" : "failed";
              if (slackNotification === "failed") core.warning(`Slack notification failed: ${body.error || res.status}`);
            }

            if (raw.slack_response_url) {
              await fetch(raw.slack_response_url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  replace_original: false,
                  text: slackNotification === "posted"
                    ? "DUUMBI intake dispatch was queued."
                    : "DUUMBI intake dispatch was recorded, but Slack agent dispatch notification was not posted.",
                }),
              });
            }

            const now = new Date().toISOString();
            fs.writeFileSync(process.env.DUUMBI_METRICS_PATH, `${JSON.stringify({
              schema_version: "duumbi.workflow_metrics.v1",
              generated_at: now,
              source: "github_actions",
              repository: `${context.repo.owner}/${context.repo.repo}`,
              workflow: { name: context.workflow, file: ".github/workflows/slack-intake-dispatch.yml", run_id: context.runId, run_attempt: Number(process.env.GITHUB_RUN_ATTEMPT || 1), event_name: context.eventName, actor: context.actor, ref: context.ref, sha: context.sha, conclusion: "success", started_at: now, completed_at: now, duration_ms: null },
              correlation: { issue_number: null, pr_number: null, stage: "1", decision: null, project_status: null },
              counts: { issues_considered: null, issues_queued: 1, slack_notifications_attempted: slackNotification === "posted" ? 1 : 0, artifact_links_found: raw.message_ts ? 1 : 0, artifact_links_missing: raw.message_ts ? 0 : 1 },
              provider_usage: { available: false, reason: "agent_dispatch_only", provider: null, model: null, request_count: null, prompt_tokens: null, completion_tokens: null, total_tokens: null, estimated_cost_usd: null, latency_ms: null, failure_count: null },
              privacy: { metadata_only: true, raw_prompts_included: false, raw_completions_included: false, raw_slack_payloads_included: false, secrets_included: false },
              warnings: slackNotification === "posted" ? [] : [`slack_notification_${slackNotification}`],
            }, null, 2)}\n`);

            await core.summary
              .addHeading("DUUMBI Slack Intake Dispatch", 2)
              .addTable([
                [{ data: "Field", header: true }, { data: "Value", header: true }],
                ["Source", sourceSummary],
                ["Slack dispatch", slackNotification],
              ])
              .addHeading("Agent Prompt", 3)
              .addCodeBlock(prompt, "text")
              .write();

      - name: Upload DUUMBI workflow metrics
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: duumbi-workflow-metrics-slack-intake-${{ github.run_id }}-${{ github.run_attempt }}
          path: duumbi-workflow-metrics.json
          if-no-files-found: warn
